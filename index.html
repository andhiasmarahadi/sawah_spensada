<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAWAH - SPENSADA Absensi Wajah</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Face-API.js -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        
        .scan-line {
            width: 100%; height: 4px; background: rgba(59, 130, 246, 0.8);
            position: absolute; top: 0; left: 0; animation: scan 2s infinite linear; box-shadow: 0 0 15px rgba(59, 130, 246, 0.8);
        }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        
        #map-picker { z-index: 1; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="text-gray-800 antialiased overflow-hidden">

<script>
    // ==========================================
    // KONFIGURASI APLIKASI UTAMA
    // ==========================================
    // WAJIB DIGANTI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
    const GAS_URL = "https://script.google.com/macros/s/AKfycbww997sf71j-KmjASWce1ViGau6nlpPQxdMac9oDpWKkjSlQO7IRfizfFJv7KXkX3IMag/exec"; 
    const APP_LOGO = "https://i.imghippo.com/files/Qvgj6380ctk.png";

    // STATE APLIKASI (Data Dari Server)
    let currentUser = null; 
    let appData = { users: [], absensi: [], lokasi: [], izin: [] };
    
    let stream = null; let mapInstance = null; let mapMarker = null; let activeInterval = null;

    // --- PENGIRIMAN DATA KE SERVER (WRAPPER) ---
    async function apiCall(payload) {
        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });
            return await response.json();
        } catch (error) {
            console.error("API Error:", error);
            return { success: false, message: 'Gagal terhubung ke Server Database.' };
        }
    }

    // --- FUNGSI MENGAMBIL SELURUH DATA SETELAH LOGIN ---
    async function fetchAllData() {
        Swal.fire({ title: 'Menyinkronkan Database...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
        const res = await apiCall({ action: 'getData' });
        if(res.success) {
            appData = res.data;
            // Join Absensi dengan nama & kelas dari Users
            appData.absensi = appData.absensi.map(absen => {
                let u = appData.users.find(x => x.id === absen.id_user);
                return { ...absen, nama: u ? u.nama : 'Unknown', kelas: u ? u.kelas : '-' };
            });
            Swal.close();
            renderApp();
        } else {
            Swal.fire('Error', 'Gagal memuat data dari Spreadsheet', 'error');
        }
    }

    // --- FUNGSI AKSI (CRUD) KE SERVER ---
    window.deleteSingle = function(id, type, sheetName) {
         Swal.fire({ title: 'Hapus Data Ini?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Ya, Hapus' }).then(async res => {
             if(res.isConfirmed) {
                 Swal.fire({ title: 'Menghapus...', didOpen: () => Swal.showLoading() });
                 let resp = await apiCall({ action: 'deleteData', sheetName: sheetName, id: id });
                 if(resp.success) {
                     if(type === 'user') appData.users = appData.users.filter(u => u.id !== id);
                     if(type === 'lokasi') appData.lokasi = appData.lokasi.filter(l => l.id !== id);
                     Swal.fire('Terhapus', 'Data berhasil dihapus dari Sheets.', 'success');
                     changeView('admin-' + (type==='user'?'users':'lokasi'));
                 } else { Swal.fire('Error', resp.message, 'error'); }
             }
         });
    };

    window.showAddUserModal = function() {
        Swal.fire({
            title: '<div class="text-xl font-bold text-slate-800">Tambah Anggota</div>',
            html: `
                <div class="text-left px-2 mt-4">
                    <div class="mb-3"><label class="block text-xs font-bold text-slate-500">Nama Lengkap</label><input id="swal-nama" class="w-full border p-2 text-sm rounded-lg" required></div>
                    <div class="mb-3"><label class="block text-xs font-bold text-slate-500">NISN / NIP (Jadi Username)</label><input id="swal-nisn" class="w-full border p-2 text-sm rounded-lg" required></div>
                    <div class="grid grid-cols-2 gap-3 mb-1">
                        <div><label class="block text-xs font-bold text-slate-500">Akses</label><select id="swal-role" class="w-full border p-2 text-sm rounded-lg"><option value="Siswa">Siswa</option><option value="Wali">Wali Kelas</option><option value="Admin">Admin</option></select></div>
                        <div><label class="block text-xs font-bold text-slate-500">Kelas</label><input id="swal-kelas" placeholder="Cth: 7A" class="w-full border p-2 text-sm rounded-lg"></div>
                    </div>
                    <p class="text-[10px] text-slate-400 mt-2 text-center">Password default: 123456</p>
                </div>
            `,
            showCancelButton: true, confirmButtonText: 'Simpan ke Server', confirmButtonColor: '#2563eb',
            preConfirm: () => {
                let v = { nama: document.getElementById('swal-nama').value, nisn: document.getElementById('swal-nisn').value, role: document.getElementById('swal-role').value, kelas: document.getElementById('swal-kelas').value || '-' };
                if(!v.nama || !v.nisn) return Swal.showValidationMessage('Nama dan NISN wajib diisi!'); return v;
            }
        }).then(async (result) => {
            if (result.isConfirmed) { 
                Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });
                let resp = await apiCall({ action: 'addUser', ...result.value });
                if(resp.success) { Swal.fire('Berhasil', 'User tersimpan di Spreadsheet', 'success'); fetchAllData(); } 
                else { Swal.fire('Gagal', resp.message, 'error'); }
            }
        });
    };

    window.simpanLokasiBaru = async function() {
        let payload = {
            action: 'addLokasi', nama: document.getElementById('lokasi-nama').value,
            lat: document.getElementById('lat').value, lon: document.getElementById('lon').value,
            radius: document.getElementById('radius').value
        };
        if(!payload.nama || !payload.lat) return Swal.fire('Error', 'Lengkapi data.', 'error');
        
        Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });
        let resp = await apiCall(payload);
        if(resp.success) { Swal.fire('Berhasil', 'Lokasi tersimpan.', 'success'); fetchAllData(); } 
        else { Swal.fire('Gagal', resp.message, 'error'); }
    };

    // --- FILTERING FRONTEND ---
    window.filterAbsensi = function() {
        let keyword = document.getElementById('search-absensi').value.toLowerCase();
        let rows = document.querySelectorAll(`#table-absensi tbody tr`);
        rows.forEach(row => {
            if(row.children.length === 1) return; 
            row.style.display = row.innerText.toLowerCase().includes(keyword) ? '' : 'none';
        });
    };

    window.filterUsers = function() {
        let keyword = document.getElementById('search-users').value.toLowerCase();
        let rows = document.querySelectorAll(`#table-users tbody tr`);
        rows.forEach(row => {
            if(row.children.length === 1) return; 
            row.style.display = row.innerText.toLowerCase().includes(keyword) ? '' : 'none';
        });
    };

    // ==========================================
    // RENDER ENGINE (UI)
    // ==========================================
    window.onload = () => { const root = document.createElement('div'); root.id = 'app-root'; root.className = 'w-full h-screen'; document.body.appendChild(root); root.appendChild(createLoginView()); };

    function renderApp() {
        const root = document.getElementById('app-root'); root.innerHTML = '';
        root.appendChild(createDashboardView());
    }

    function createLoginView() {
        const container = document.createElement('div'); container.className = 'flex w-full h-full bg-slate-50';
        container.innerHTML = `
            <div class="hidden md:flex w-1/2 bg-gradient-to-br from-blue-900 via-indigo-800 to-blue-900 justify-center items-center flex-col text-white shadow-inner">
                <div class="bg-white p-4 rounded-full shadow-2xl mb-8"><img src="${APP_LOGO}" alt="Logo" class="w-48 h-auto"></div>
                <h1 class="text-4xl font-extrabold mb-4 tracking-wider">SAWAH</h1><div class="h-1 w-16 bg-blue-400 rounded mb-4"></div>
                <p class="text-lg text-blue-100 font-light">Sistem Absensi Wajah Terintegrasi</p>
            </div>
            <div class="w-full md:w-1/2 flex justify-center items-center p-8 bg-white">
                <div class="w-full max-w-md">
                    <div class="md:hidden flex justify-center mb-8"><img src="${APP_LOGO}" class="w-24 h-auto"></div>
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Selamat Datang</h2><p class="text-gray-500 mb-8 font-medium">Masuk untuk melanjutkan</p>
                    <form id="loginForm" class="space-y-6">
                        <div><label class="block text-sm font-semibold text-gray-700 mb-1">Username / NISN</label><input type="text" id="username" required class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500"></div>
                        <div><label class="block text-sm font-semibold text-gray-700 mb-1">Password</label><input type="password" id="password" required class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500"></div>
                        <button type="submit" class="w-full py-3 bg-blue-600 text-white font-bold rounded-lg shadow-md hover:bg-blue-700 transition">MASUK SISTEM</button>
                    </form>
                    <div class="mt-8 text-center text-xs text-gray-500 bg-emerald-50 p-3 rounded border border-emerald-100"><i class="fas fa-database text-emerald-600 mr-1"></i> Aplikasi Live (Koneksi ke Google Sheets Aktif)</div>
                </div>
            </div>`;
        container.querySelector('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            Swal.fire({ title: 'Verifikasi Server...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
            let resp = await apiCall({ action: 'login', username: document.getElementById('username').value, password: document.getElementById('password').value });
            if(resp.success) { currentUser = resp.user; fetchAllData(); } else { Swal.fire('Gagal Login', resp.message, 'error'); }
        });
        return container;
    }

    function createDashboardView() {
        const container = document.createElement('div'); container.className = 'flex h-screen bg-slate-50';
        const sidebar = document.createElement('aside'); sidebar.id = 'sidebar';
        sidebar.className = 'w-64 bg-slate-900 text-slate-300 flex flex-col hidden md:flex sidebar-transition absolute md:relative z-50 h-full shadow-2xl';
        
        let menuItems = '';
        if (currentUser.role === 'Admin') {
            menuItems = `
                <div class="px-6 py-5 font-bold text-lg text-white border-b border-slate-800 bg-slate-950 flex items-center"><i class="fas fa-shield-alt text-blue-500 mr-3"></i> Panel Admin</div>
                <nav class="flex-1 px-3 py-6 space-y-1 overflow-y-auto">
                    <a href="#" onclick="changeView('admin-dashboard')" data-view="admin-dashboard" class="nav-item flex items-center px-4 py-3 text-sm font-medium rounded-lg"><i class="fas fa-home w-6"></i> Dashboard</a>
                    <a href="#" onclick="changeView('admin-users')" data-view="admin-users" class="nav-item flex items-center px-4 py-3 text-sm font-medium rounded-lg"><i class="fas fa-users w-6"></i> Kelola Anggota</a>
                    <a href="#" onclick="changeView('admin-absensi')" data-view="admin-absensi" class="nav-item flex items-center px-4 py-3 text-sm font-medium rounded-lg"><i class="fas fa-calendar-check w-6"></i> Laporan Absensi</a>
                    <a href="#" onclick="changeView('admin-lokasi')" data-view="admin-lokasi" class="nav-item flex items-center px-4 py-3 text-sm font-medium rounded-lg"><i class="fas fa-map-marker-alt w-6"></i> Data Lokasi GPS</a>
                </nav>`;
        } else {
             menuItems = `
                <div class="px-6 py-5 font-bold text-lg text-white border-b border-slate-800 bg-slate-950 flex items-center"><i class="fas fa-id-badge text-blue-500 mr-3"></i> Portal Siswa</div>
                <nav class="flex-1 px-3 py-6 space-y-1">
                    <a href="#" onclick="changeView('siswa-scan')" data-view="siswa-scan" class="nav-item flex items-center px-4 py-3 text-sm font-medium rounded-lg"><i class="fas fa-camera w-6"></i> Scan Absen</a>
                    <a href="#" onclick="changeView('siswa-riwayat')" data-view="siswa-riwayat" class="nav-item flex items-center px-4 py-3 text-sm font-medium rounded-lg"><i class="fas fa-history w-6"></i> Riwayat Saya</a>
                </nav>`;
        }

        sidebar.innerHTML = menuItems + `<div class="p-4 border-t border-slate-800 bg-slate-950"><button onclick="location.reload()" class="w-full flex items-center justify-center p-3 bg-red-500/10 hover:bg-red-600 rounded-lg text-red-500 hover:text-white transition-all font-semibold text-sm"><i class="fas fa-sign-out-alt mr-2"></i> Keluar</button></div>`;

        const main = document.createElement('div'); main.className = 'flex-1 flex flex-col h-screen overflow-hidden';
        main.innerHTML = `
            <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-10">
                <div class="flex items-center"><button onclick="document.getElementById('sidebar').classList.toggle('hidden')" class="md:hidden text-gray-500 mr-4"><i class="fas fa-bars text-xl"></i></button><h2 class="font-bold text-xl text-gray-800" id="header-title">Dashboard</h2></div>
                <div class="flex items-center bg-slate-50 py-1.5 px-3 rounded-full border border-slate-200">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold mr-3">${currentUser.nama.charAt(0)}</div>
                    <div class="text-right hidden sm:block"><div class="text-sm font-bold text-gray-800">${currentUser.nama}</div><div class="text-xs text-blue-600">${currentUser.role}</div></div>
                </div>
            </header>
            <main id="main-content" class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-50 p-6 custom-scroll"></main>
        `;
        container.appendChild(sidebar); container.appendChild(main);
        setTimeout(() => { changeView(currentUser.role === 'Admin' ? 'admin-dashboard' : 'siswa-scan'); }, 0);
        return container;
    }

    function changeView(viewName) {
        document.querySelectorAll('.nav-item').forEach(el => { el.classList.remove('bg-slate-800', 'text-white', 'shadow-inner'); el.classList.add('text-slate-300', 'hover:bg-slate-800'); });
        const activeItem = document.querySelector(`.nav-item[data-view="${viewName}"]`);
        if(activeItem) { activeItem.classList.add('bg-slate-800', 'text-white', 'shadow-inner'); activeItem.classList.remove('text-slate-300', 'hover:bg-slate-800'); }
        
        const content = document.getElementById('main-content'); const headerTitle = document.getElementById('header-title');
        if(stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        if(activeInterval) { clearInterval(activeInterval); activeInterval = null; }

        switch(viewName) {
            case 'admin-dashboard': headerTitle.innerText = "Ringkasan Sistem"; content.innerHTML = renderAdminDashboard(); break;
            case 'admin-users': headerTitle.innerText = "Data Anggota (Sheets Sync)"; content.innerHTML = renderAdminUsers(); break;
            case 'admin-absensi': headerTitle.innerText = "Laporan Absensi (Sheets Sync)"; content.innerHTML = renderAdminAbsensi(); break;
            case 'admin-lokasi': headerTitle.innerText = "Manajemen Area GPS"; content.innerHTML = renderAdminLokasi(); setTimeout(initMap, 300); break;
            case 'siswa-scan': headerTitle.innerText = "Pindai Wajah Kehadiran"; content.innerHTML = renderSiswaScan(); break;
            case 'siswa-riwayat': headerTitle.innerText = "Riwayat Kehadiran Saya"; content.innerHTML = renderSiswaRiwayat(); break;
        }
    }

    // ==========================================
    // RENDER FUNGSI (Menampilkan Data Live ke HTML)
    // ==========================================
    function renderAdminDashboard() {
        return `
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 border-l-4 border-l-blue-500">
                    <p class="text-sm font-semibold text-slate-500 mb-1">Total Pengguna Terdaftar</p><h3 class="text-4xl font-black text-slate-800">${appData.users.length}</h3>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 border-l-4 border-l-emerald-500">
                    <p class="text-sm font-semibold text-slate-500 mb-1">Total Data Absensi Tersimpan</p><h3 class="text-4xl font-black text-slate-800">${appData.absensi.length}</h3>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 border-l-4 border-l-amber-500">
                    <p class="text-sm font-semibold text-slate-500 mb-1">Titik Lokasi Aktif</p><h3 class="text-4xl font-black text-slate-800">${appData.lokasi.length}</h3>
                </div>
            </div>
            <div class="bg-blue-50 p-6 rounded-2xl border border-blue-100 text-blue-800"><h4 class="font-bold"><i class="fas fa-check-circle mr-2"></i>Sistem Live Berjalan Sempurna</h4><p class="text-sm mt-1">Data yang ditampilkan di menu Data Anggota dan Data Absensi adalah data asli yang ditarik (fetch) dari file Google Sheets Anda.</p></div>
        `;
    }

    function renderAdminUsers() {
        let rows = appData.users.map((u, i) => `
            <tr class="border-b border-slate-100 hover:bg-slate-50">
                <td class="px-4 py-3 text-sm">${i+1}</td>
                <td class="px-4 py-3 text-sm font-bold text-slate-800">${u.nama}</td>
                <td class="px-4 py-3 text-sm text-slate-600">${u.nisn || u.username}</td>
                <td class="px-4 py-3 text-sm text-slate-600">${u.kelas}</td>
                <td class="px-4 py-3 text-sm"><span class="px-2 py-1 text-xs font-bold rounded-full bg-blue-100 text-blue-700">${u.role}</span></td>
                <td class="px-4 py-3 text-sm"><button onclick="deleteSingle('${u.id}', 'user', 'Users')" class="text-red-500 hover:bg-red-100 p-1.5 rounded"><i class="fas fa-trash"></i></button></td>
            </tr>`).join('');

        return `
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-bold">Direktori Anggota</h3>
                    <div class="space-x-2"><button onclick="fetchAllData()" class="bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg text-sm font-semibold"><i class="fas fa-sync mr-1"></i> Refresh Data</button><button onclick="showAddUserModal()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold"><i class="fas fa-plus mr-1"></i> Tambah Anggota</button></div>
                </div>
                <input type="text" id="search-users" onkeyup="filterUsers()" placeholder="Cari nama..." class="w-full mb-4 border p-2 text-sm rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
                <div class="overflow-x-auto max-h-[450px] custom-scroll border rounded-xl"><table id="table-users" class="w-full text-left relative"><thead class="bg-slate-50 border-b sticky top-0 shadow-sm"><tr><th class="px-4 py-3 text-sm">No</th><th class="px-4 py-3 text-sm">Nama Lengkap</th><th class="px-4 py-3 text-sm">NISN/Username</th><th class="px-4 py-3 text-sm">Kelas</th><th class="px-4 py-3 text-sm">Role</th><th class="px-4 py-3 text-sm">Aksi</th></tr></thead><tbody>${rows || '<tr><td colspan="6" class="text-center py-4">Data Kosong</td></tr>'}</tbody></table></div>
            </div>`;
    }

    function renderAdminAbsensi() {
        let rows = appData.absensi.map((a, i) => `
            <tr class="border-b border-slate-100 hover:bg-slate-50">
                <td class="px-4 py-3 text-sm">${i+1}</td>
                <td class="px-4 py-3 text-sm font-bold text-slate-800">${a.nama}</td><td class="px-4 py-3 text-sm text-slate-600">${a.kelas}</td>
                <td class="px-4 py-3 text-sm">${a.tanggal}</td>
                <td class="px-4 py-3 text-sm font-bold text-emerald-600">${a.waktu_in}</td><td class="px-4 py-3 text-sm font-bold text-rose-600">${a.waktu_out}</td>
                <td class="px-4 py-3 text-sm"><button onclick="deleteSingle('${a.id}', 'absensi', 'Absensi')" class="text-red-500 hover:bg-red-100 p-1.5 rounded"><i class="fas fa-trash"></i></button></td>
            </tr>`).join('');

        return `
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-bold">Tabel Rekam Absensi</h3>
                    <button onclick="fetchAllData()" class="bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold"><i class="fas fa-sync mr-1"></i> Tarik Data Terbaru</button>
                </div>
                <input type="text" id="search-absensi" onkeyup="filterAbsensi()" placeholder="Cari nama atau tanggal..." class="w-full mb-4 border p-2 text-sm rounded-lg outline-none bg-slate-50">
                <div class="overflow-x-auto max-h-[500px] custom-scroll border rounded-xl"><table id="table-absensi" class="w-full text-left relative"><thead class="bg-slate-50 border-b sticky top-0 shadow-sm"><tr><th class="px-4 py-3 text-sm">No</th><th class="px-4 py-3 text-sm">Nama Siswa</th><th class="px-4 py-3 text-sm">Kelas</th><th class="px-4 py-3 text-sm">Tanggal</th><th class="px-4 py-3 text-sm">Jam Masuk</th><th class="px-4 py-3 text-sm">Jam Keluar</th><th class="px-4 py-3 text-sm">Aksi</th></tr></thead><tbody>${rows || '<tr><td colspan="7" class="text-center py-4">Belum ada data Absensi.</td></tr>'}</tbody></table></div>
            </div>`;
    }

    function renderAdminLokasi() {
        return `
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white rounded-2xl shadow-sm border p-6">
                    <h3 class="text-lg font-bold mb-4">Tambah Titik GPS</h3>
                    <div class="mb-4 border rounded-xl overflow-hidden relative shadow-sm"><div id="map-picker" class="w-full h-64 z-10 bg-slate-100"></div><div class="absolute top-2 right-2 z-[400]"><button onclick="getGPSCurrent(this)" class="bg-white text-blue-600 px-3 py-2 rounded-lg shadow-md font-bold text-xs"><i class="fas fa-crosshairs"></i> Posisi Saat Ini</button></div></div>
                    <form onsubmit="event.preventDefault(); simpanLokasiBaru();" class="space-y-4">
                        <div><label class="block text-xs font-bold mb-1">Nama Area</label><input type="text" id="lokasi-nama" required class="w-full border p-2.5 rounded-lg text-sm"></div>
                        <div class="grid grid-cols-2 gap-4"><div><label class="block text-xs font-bold mb-1">Lat</label><input type="text" id="lat" required readonly class="w-full bg-slate-50 border p-2.5 rounded-lg text-sm"></div><div><label class="block text-xs font-bold mb-1">Lon</label><input type="text" id="lon" required readonly class="w-full bg-slate-50 border p-2.5 rounded-lg text-sm"></div></div>
                        <div><label class="block text-xs font-bold mb-1">Radius (Meter)</label><input type="number" id="radius" value="50" required class="w-full border p-2.5 rounded-lg text-sm"></div>
                        <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold text-sm">Simpan Titik Server</button>
                    </form>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border p-6"><h3 class="text-lg font-bold mb-4">Daftar Titik Diizinkan</h3><div class="space-y-3">${appData.lokasi.map(l => `<div class="border p-4 bg-slate-50 rounded-xl relative"><h4><b>${l.nama_lokasi}</b></h4><p class="text-xs text-slate-600 mt-1">Lat: ${l.lat}, Lon: ${l.lon} | Rad: ${l.radius}m</p><button onclick="deleteSingle('${l.id}', 'lokasi', 'Lokasi')" class="absolute top-4 right-4 text-red-500"><i class="fas fa-trash"></i></button></div>`).join('')}</div></div>
            </div>`;
    }

    function initMap() {
        const mapEl = document.getElementById('map-picker'); if (!mapEl) return;
        const defaultLat = -8.5361; const defaultLon = 115.4215;
        if (mapInstance !== null) { mapInstance.off(); mapInstance.remove(); mapInstance = null; }
        mapInstance = L.map('map-picker').setView([defaultLat, defaultLon], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
        document.getElementById('lat').value = defaultLat; document.getElementById('lon').value = defaultLon;
        const icon = L.icon({ iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png', shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png', iconAnchor: [12, 41] });
        mapMarker = L.marker([defaultLat, defaultLon], {draggable: true, icon: icon}).addTo(mapInstance);
        mapMarker.on('dragend', function (e) { const pos = mapMarker.getLatLng(); document.getElementById('lat').value = pos.lat.toFixed(6); document.getElementById('lon').value = pos.lng.toFixed(6); });
        mapInstance.on('click', function (e) { mapMarker.setLatLng(e.latlng); document.getElementById('lat').value = e.latlng.lat.toFixed(6); document.getElementById('lon').value = e.latlng.lng.toFixed(6); });
        setTimeout(() => { mapInstance.invalidateSize(); }, 400);
    }
    
    function getGPSCurrent(btn) {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude; const lon = pos.coords.longitude;
                document.getElementById('lat').value = lat.toFixed(6); document.getElementById('lon').value = lon.toFixed(6);
                if (mapInstance && mapMarker) { const newLatLng = new L.LatLng(lat, lon); mapMarker.setLatLng(newLatLng); mapInstance.setView(newLatLng, 18); }
            });
        }
    }

    // ==========================================
    // LOGIC SCANNER & SISWA
    // ==========================================
    function renderSiswaScan() {
        setTimeout(startCameraAndGPS, 100);
        return `
            <div class="max-w-md mx-auto relative"><div class="bg-white rounded-3xl shadow-xl overflow-hidden border">
                <div class="bg-slate-950 p-5 text-center text-white relative shadow-inner"><h3 class="text-xl font-bold tracking-wide">Scanner Kehadiran</h3><div id="gps-status" class="absolute top-5 right-5 text-[10px] uppercase font-bold bg-amber-500 px-2.5 py-1 rounded-full"><i class="fas fa-spinner fa-spin"></i> GPS</div></div>
                <div class="relative bg-slate-900 h-80 flex items-center justify-center overflow-hidden">
                    <video id="webcam" autoplay playsinline class="w-full h-full object-cover hidden"></video>
                    <div id="camera-placeholder" class="text-slate-400 text-center"><i class="fas fa-compass text-5xl mb-4 animate-spin-slow"></i><p>Akses Lokasi & Kamera</p></div>
                    <div id="guide-frame" class="absolute inset-0 pointer-events-none hidden"><div class="w-52 h-72 border-[3px] border-dashed border-white/60 rounded-full mx-auto mt-4 relative shadow-[0_0_0_9999px_rgba(0,0,0,0.4)]"><div class="scan-line hidden" id="scan-line-anim"></div></div><div class="absolute bottom-6 w-full flex justify-center"><span id="liveness-instruction" class="bg-slate-900/80 text-white px-5 py-2 rounded-full text-sm font-bold border shadow-lg">Siap Di-scan</span></div></div>
                </div>
                <div class="p-6 bg-white grid grid-cols-2 gap-4">
                    <button onclick="processScan('IN')" id="btn-in" disabled class="opacity-50 cursor-not-allowed bg-emerald-500 text-white py-4 rounded-2xl font-extrabold hover:bg-emerald-600 transition"><i class="fas fa-sign-in-alt block text-2xl mb-1"></i>SCAN IN</button>
                    <button onclick="processScan('OUT')" id="btn-out" disabled class="opacity-50 cursor-not-allowed bg-rose-500 text-white py-4 rounded-2xl font-extrabold hover:bg-rose-600 transition"><i class="fas fa-sign-out-alt block text-2xl mb-1"></i>SCAN OUT</button>
                </div>
            </div></div>`;
    }

    function startCameraAndGPS() {
        const video = document.getElementById('webcam'); const placeholder = document.getElementById('camera-placeholder'); const guide = document.getElementById('guide-frame');
        const btnIn = document.getElementById('btn-in'); const btnOut = document.getElementById('btn-out'); const gpsStatus = document.getElementById('gps-status');

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                gpsStatus.innerHTML = '<i class="fas fa-check-circle"></i> Valid'; gpsStatus.className = 'absolute top-5 right-5 text-[10px] uppercase font-bold bg-emerald-500 text-white px-2.5 py-1 rounded-full shadow-md';
                const tmpLat = document.createElement('input'); tmpLat.type = 'hidden'; tmpLat.id = 'scan-lat'; tmpLat.value = pos.coords.latitude;
                const tmpLon = document.createElement('input'); tmpLon.type = 'hidden'; tmpLon.id = 'scan-lon'; tmpLon.value = pos.coords.longitude;
                document.body.appendChild(tmpLat); document.body.appendChild(tmpLon);
                
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false }).then((s) => {
                    stream = s; video.srcObject = stream; video.classList.remove('hidden'); placeholder.classList.add('hidden'); guide.classList.remove('hidden');
                    btnIn.disabled = false; btnIn.classList.remove('opacity-50', 'cursor-not-allowed'); btnOut.disabled = false; btnOut.classList.remove('opacity-50', 'cursor-not-allowed');
                });
            },
            (err) => { gpsStatus.innerHTML = '<i class="fas fa-times"></i> GPS Error'; gpsStatus.classList.replace('bg-amber-500', 'bg-rose-500'); }
        );
    }

    function processScan(type) {
        const video = document.getElementById('webcam'); const scanLine = document.getElementById('scan-line-anim');
        scanLine.classList.remove('hidden'); document.getElementById('liveness-instruction').innerText = "Memverifikasi...";
        document.getElementById('btn-in').disabled = true; document.getElementById('btn-out').disabled = true;

        setTimeout(async () => {
            const canvas = document.createElement('canvas'); canvas.width = 320; canvas.height = 240; 
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            let b64 = canvas.toDataURL('image/jpeg', 0.5);
            
            Swal.fire({ title: 'Kirim ke Server...', didOpen: () => Swal.showLoading() });
            let resp = await apiCall({ action: 'scan', type: type, id_user: currentUser.id, image: b64, lat: document.getElementById('scan-lat').value, lon: document.getElementById('scan-lon').value });
            
            if(resp.success) { Swal.fire('Berhasil', 'Absen terkirim.', 'success'); fetchAllData(); } 
            else { Swal.fire('Gagal', resp.message, 'error'); document.getElementById('scan-line-anim').classList.add('hidden'); document.getElementById('btn-in').disabled = false; document.getElementById('btn-out').disabled = false; }
        }, 1500);
    }

    function renderSiswaRiwayat() {
        let myAbsen = appData.absensi.filter(a => a.id_user === currentUser.id);
        let rows = myAbsen.map(a => `<tr><td class="px-5 py-4 border-b text-sm">${a.tanggal}</td><td class="px-5 py-4 border-b text-sm font-bold text-emerald-600">${a.waktu_in}</td><td class="px-5 py-4 border-b text-sm font-bold text-rose-600">${a.waktu_out}</td></tr>`).join('');
        return `<div class="bg-white rounded-2xl shadow-sm border p-6"><h3 class="text-lg font-bold mb-4">Riwayat Hadir</h3><table class="w-full text-left"><thead><tr><th class="border-b px-5 py-3">Tanggal</th><th class="border-b px-5 py-3">Scan Masuk</th><th class="border-b px-5 py-3">Scan Keluar</th></tr></thead><tbody>${rows || '<tr><td colspan="3" class="text-center py-4">Data kosong</td></tr>'}</tbody></table></div>`;
    }
</script>
</body>
</html>
