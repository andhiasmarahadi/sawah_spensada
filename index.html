<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        
        /* Animasi Scanner Wajah */
        .scan-line {
            width: 100%; height: 4px; background: rgba(59, 130, 246, 0.8);
            position: absolute; top: 0; left: 0;
            animation: scan 2s infinite linear;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.8);
        }
        @keyframes scan {
            0% { top: 0; } 50% { top: 100%; } 100% { top: 0; }
        }
        
        /* Leaflet map fix inside flex container */
        #map-picker { z-index: 1; }
        
        /* Custom scrollbar for tables */
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-gray-800 antialiased overflow-hidden">

<script>
    // ==========================================
    // KONFIGURASI APLIKASI
    // ==========================================

    const GAS_URL = "URL_DEPLOY_GAS_ANDA_DISINI"; 
    const APP_LOGO = "https://i.imghippo.com/files/Qvgj6380ctk.png";

    // --- DATA DUMMY ---
    let dummyUsers = [
        { id: 'u1', username: 'admin', password: 'edudigital', role: 'Admin', nama: 'Administrator', kelas: '-', nisn: '-' },
        { id: 'u2', username: '198001012000', password: '123456', role: 'Kepsek', nama: 'Bpk. Kepala Sekolah', kelas: '-', nisn: '198001012000' },
        { id: 'u3', username: '198502022010', password: '123456', role: 'Wali', nama: 'Ibu Wali Kelas 7A', kelas: '7A', nisn: '198502022010' },
        { id: 'u4', username: '0012345678', password: '123456', role: 'Siswa', nama: 'Siswa Teladan', kelas: '7A', nisn: '0012345678', face_registered: true }
    ];

    let dummyAbsensi = [
        { id: 'a1', id_user: 'u4', nama: 'Siswa Teladan', kelas: '7A', tanggal: new Date().toISOString().split('T')[0], waktu_in: '06:45:00', waktu_out: '14:05:00', status: 'Hadir' }
    ];

    let dummyLokasi = [
        { id: 'l1', nama: 'Gerbang Utama SMPN 1', lat: -8.5361, lon: 115.4215, radius: 100 }
    ];

    let dummyIzin = [];

    let dummyPengaturan = {
        scan_in_start: '06:00', scan_in_end: '07:15',
        scan_out_start: '14:00', scan_out_end: '16:00'
    };

    // Inject 15 user tambahan agar fitur scrollbar (maks 10 data) terlihat
    for(let i=1; i<=15; i++) {
        let nisnDummy = '00112233' + (i < 10 ? '0'+i : i);
        dummyUsers.push({ id: 'u_dummy_'+i, username: nisnDummy, password: '123456', role: 'Siswa', nama: 'Siswa Simulasi '+i, kelas: '8A', nisn: nisnDummy, face_registered: false });
    }
    // Inject Data Dummy Izin & Absensi Tambahan
    dummyIzin.push({ id: 'iz1', id_user: 'u4', nama: 'Siswa Teladan', kelas: '7A', jenis: 'Sakit', dari: '2026-05-18', sampai: '2026-05-19', status: 'Pending', alasan: 'Demam Berdarah' });
    dummyIzin.push({ id: 'iz2', id_user: 'u_dummy_1', nama: 'Siswa Simulasi 1', kelas: '8A', jenis: 'Izin', dari: '2026-05-20', sampai: '2026-05-20', status: 'Disetujui', alasan: 'Acara Keluarga' });
    dummyAbsensi.push({ id: 'a2', id_user: 'u_dummy_4', nama: 'Siswa Simulasi 4', kelas: '8A', tanggal: new Date().toISOString().split('T')[0], waktu_in: '07:20:00', waktu_out: '14:00:00', status: 'Terlambat' });

    // --- FUNGSI AKSI GLOBAL ---
    window.deleteAllData = function(type) {
        Swal.fire({
            title: 'Hapus Semua Data?',
            text: `Anda yakin ingin mengosongkan seluruh data ${type}?`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#94a3b8',
            confirmButtonText: 'Ya, Kosongkan!'
        }).then((result) => {
            if (result.isConfirmed) {
                if(type === 'anggota') dummyUsers = dummyUsers.filter(u => u.role !== 'Siswa'); 
                else if(type === 'absensi') dummyAbsensi = [];
                else if(type === 'lokasi') dummyLokasi = [];
                else if(type === 'izin') dummyIzin = [];
                
                Swal.fire('Terhapus!', `Semua data ${type} telah dibersihkan.`, 'success');
                if(type === 'anggota') changeView('admin-users');
                else if(type === 'absensi') changeView('admin-absensi');
                else if(type === 'lokasi') changeView('admin-lokasi');
                else if(type === 'izin') changeView(currentUser.role === 'Admin' ? 'admin-izin' : 'wali-izin');
            }
        });
    };

    window.deleteSingle = function(id, type) {
         Swal.fire({ title: 'Hapus Item Ini?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Hapus' }).then(res => {
             if(res.isConfirmed) {
                 if(type==='user') dummyUsers = dummyUsers.filter(u => u.id !== id);
                 else if(type==='lokasi') dummyLokasi = dummyLokasi.filter(l => l.id !== id);
                 Swal.fire('Terhapus', 'Item berhasil dihapus.', 'success');
                 changeView('admin-' + (type==='user'?'users':'lokasi'));
             }
         });
    };

    window.updateIzin = function(id, status) {
        let item = dummyIzin.find(i => i.id === id);
        if(item) item.status = status;
        Swal.fire('Berhasil', `Status Keterangan diubah menjadi: ${status}`, 'success');
        changeView(currentUser.role === 'Admin' ? 'admin-izin' : 'wali-izin');
    };

    window.mockAction = function(title) {
        Swal.fire(title, 'Fungsi ini aktif dan siap memproses data.', 'info');
    };

    // --- FUNGSI FILTERING ---
    window.filterAbsensi = function() {
        let keyword = document.getElementById('search-absensi').value.toLowerCase();
        let kelas = document.getElementById('filter-kelas') ? document.getElementById('filter-kelas').value : "";
        let tanggal = document.getElementById('filter-tanggal').value;
        
        let rows = document.querySelectorAll(`#table-absensi tbody tr`);
        rows.forEach(row => {
            if(row.children.length === 1) return; 
            let text = row.innerText.toLowerCase();
            let rowKelas = row.children[2].innerText;
            let rowTanggal = row.children[3].innerText;
            
            let matchKeyword = text.includes(keyword);
            let matchKelas = kelas === "" || rowKelas === kelas;
            let matchTanggal = tanggal === "" || rowTanggal === tanggal;
            
            row.style.display = (matchKeyword && matchKelas && matchTanggal) ? '' : 'none';
        });
    };

    window.filterUsers = function() {
        let keyword = document.getElementById('search-users') ? document.getElementById('search-users').value.toLowerCase() : '';
        let kelas = document.getElementById('filter-kelas-user') ? document.getElementById('filter-kelas-user').value : '';
        
        let rows = document.querySelectorAll(`#table-users tbody tr`);
        rows.forEach(row => {
            if(row.children.length === 1) return; 
            let text = row.innerText.toLowerCase();
            let rowKelas = row.children[4] ? row.children[4].innerText : ''; 
            
            let matchKeyword = text.includes(keyword);
            let matchKelas = kelas === "" || rowKelas === kelas;
            
            row.style.display = (matchKeyword && matchKelas) ? '' : 'none';
        });
    };

    // --- FUNGSI LULUS DAN NAIK KELAS ---
    window.luluskanSiswa = function() {
        let siswaKelas9 = dummyUsers.filter(u => u.role === 'Siswa' && u.kelas && u.kelas.startsWith('9'));
        let jumlah = siswaKelas9.length;
        
        if (jumlah === 0) return Swal.fire('Informasi', 'Tidak ada siswa Kelas 9 yang ditemukan di database saat ini.', 'info');

        Swal.fire({
            title: 'Luluskan Siswa?',
            text: `Apakah anda akan meluluskan sebanyak ${jumlah} siswa?`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#f59e0b',
            cancelButtonColor: '#94a3b8',
            confirmButtonText: 'Ya, Luluskan!'
        }).then((result) => {
            if (result.isConfirmed) {
                dummyUsers = dummyUsers.filter(u => !(u.role === 'Siswa' && u.kelas && u.kelas.startsWith('9')));
                Swal.fire('Berhasil!', `Sebanyak ${jumlah} siswa Kelas 9 telah diluluskan.`, 'success');
                changeView('admin-users'); 
            }
        });
    };

    window.naikkanSiswa = function() {
        let siswaKelas9 = dummyUsers.filter(u => u.role === 'Siswa' && u.kelas && u.kelas.startsWith('9')).length;
        if (siswaKelas9 > 0) return Swal.fire('Peringatan', 'Masih ada Siswa Kelas 9 di database, silahkan Luluskan terlebih dahulu', 'error');

        let siswaKelas8 = dummyUsers.filter(u => u.role === 'Siswa' && u.kelas && u.kelas.startsWith('8')).length;
        let siswaKelas7 = dummyUsers.filter(u => u.role === 'Siswa' && u.kelas && u.kelas.startsWith('7')).length;
        
        if (siswaKelas8 === 0 && siswaKelas7 === 0) return Swal.fire('Informasi', 'Tidak ada siswa Kelas 7 atau Kelas 8 untuk dinaikkan.', 'info');

        Swal.fire({
            title: 'Naikkan Kelas?',
            text: `Apakah anda yakin menaikkan ${siswaKelas8} siswa kelas 8 ke kelas 9? dan menaikkan ${siswaKelas7} siswa kelas 7 ke kelas 8?`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#4f46e5',
            cancelButtonColor: '#94a3b8',
            confirmButtonText: 'Ya, Naikkan!'
        }).then((result) => {
            if (result.isConfirmed) {
                dummyUsers = dummyUsers.map(u => {
                    if (u.role === 'Siswa' && u.kelas) {
                        if (u.kelas.startsWith('8')) u.kelas = '9' + u.kelas.substring(1);
                        else if (u.kelas.startsWith('7')) u.kelas = '8' + u.kelas.substring(1);
                    }
                    return u;
                });
                Swal.fire('Berhasil!', 'Semua siswa yang memenuhi syarat telah dinaikkan kelasnya.', 'success');
                changeView('admin-users'); 
            }
        });
    };

    // --- MODAL MANAJEMEN ANGGOTA ---
    window.showAddUserModal = function() {
        Swal.fire({
            title: '<div class="flex flex-col items-center"><div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-2 shadow-inner"><i class="fas fa-user-plus text-2xl"></i></div><span class="text-xl font-bold text-slate-800">Tambah Anggota</span></div>',
            html: `
                <div class="text-left px-2 mt-4">
                    <p class="text-xs text-slate-500 mb-4 text-center leading-relaxed">Password default untuk akun baru adalah <b>123456</b>.</p>
                    <div class="mb-3">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1"><i class="fas fa-user-circle text-blue-500 mr-1"></i> Nama Lengkap</label>
                        <input id="swal-nama" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" placeholder="Contoh: Budi Santoso" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1"><i class="fas fa-id-card text-emerald-500 mr-1"></i> NISN / NIP</label>
                        <input id="swal-nisn" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" placeholder="Ketik nomor identitas..." required>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-1">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1"><i class="fas fa-user-shield text-purple-500 mr-1"></i> Akses</label>
                            <select id="swal-role" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
                                <option value="Siswa">Siswa</option>
                                <option value="Wali">Wali Kelas</option>
                                <option value="Admin">Admin</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1"><i class="fas fa-chalkboard text-amber-500 mr-1"></i> Kelas</label>
                            <select id="swal-kelas" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
                                <option value="-">Kosongkan</option>
                                <optgroup label="Kelas 7"><option value="7A">7A</option><option value="7B">7B</option><option value="7C">7C</option><option value="7D">7D</option><option value="7E">7E</option><option value="7F">7F</option><option value="7G">7G</option></optgroup>
                                <optgroup label="Kelas 8"><option value="8A">8A</option><option value="8B">8B</option><option value="8C">8C</option><option value="8D">8D</option><option value="8E">8E</option><option value="8F">8F</option><option value="8G">8G</option></optgroup>
                                <optgroup label="Kelas 9"><option value="9A">9A</option><option value="9B">9B</option><option value="9C">9C</option><option value="9D">9D</option><option value="9E">9E</option><option value="9F">9F</option><option value="9G">9G</option></optgroup>
                            </select>
                        </div>
                    </div>
                </div>
            `,
            focusConfirm: false,
            showCancelButton: true,
            confirmButtonText: '<i class="fas fa-save mr-1"></i> Simpan Data',
            cancelButtonText: 'Batal',
            confirmButtonColor: '#2563eb',
            cancelButtonColor: '#94a3b8',
            customClass: { popup: 'rounded-2xl', confirmButton: 'rounded-xl', cancelButton: 'rounded-xl' },
            preConfirm: () => {
                return {
                    nama: document.getElementById('swal-nama').value, nisn: document.getElementById('swal-nisn').value,
                    role: document.getElementById('swal-role').value, kelas: document.getElementById('swal-kelas').value
                }
            }
        }).then((result) => {
            if (result.isConfirmed) {
                let v = result.value;
                if(!v.nama) return Swal.fire('Gagal', 'Nama wajib diisi!', 'error');
                let newId = 'u_new_' + new Date().getTime();
                dummyUsers.unshift({ id: newId, username: v.nisn, password: '123456', role: v.role, nama: v.nama, kelas: v.kelas, nisn: v.nisn, face_registered: false });
                Swal.fire({icon: 'success', title: 'Tersimpan', text: 'Anggota berhasil ditambahkan.', timer: 1500, showConfirmButton: false});
                changeView('admin-users'); 
            }
        });
    };

    window.showEditUserModal = function(id) {
        let user = dummyUsers.find(u => u.id === id);
        if(!user) return;
        
        let kelasHtml = '';
        if (user.role === 'Wali' || user.role === 'Siswa') {
            const klsList = ['7A','7B','7C','7D','7E','7F','7G', '8A','8B','8C','8D','8E','8F','8G', '9A','9B','9C','9D','9E','9F','9G'];
            let options = klsList.map(c => `<option value="${c}" ${user.kelas === c ? 'selected' : ''}>${c}</option>`).join('');
            kelasHtml = `
                <div class="mb-3 text-left">
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1"><i class="fas fa-chalkboard text-amber-500 mr-1"></i> Kelas ${user.role === 'Wali' ? '(Yang Diampu)' : ''}</label>
                    <select id="swal-edit-kelas" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
                        <option value="-" ${user.kelas === '-' ? 'selected' : ''}>- Pilih Kelas -</option>${options}
                    </select>
                </div>
            `;
        } else {
            kelasHtml = `<input type="hidden" id="swal-edit-kelas" value="${user.kelas}">`;
        }
        
        Swal.fire({
            title: '<div class="text-xl font-bold text-slate-800">Edit Data Anggota</div>',
            html: `
                <div class="px-2 mt-4 text-left">
                    <div class="mb-3 text-left">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1"><i class="fas fa-user-circle text-blue-500 mr-1"></i> Nama Lengkap</label>
                        <input id="swal-edit-nama" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" value="${user.nama}">
                    </div>
                    <div class="mb-3 text-left">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1"><i class="fas fa-id-card text-emerald-500 mr-1"></i> NISN / NIP</label>
                        <input id="swal-edit-nisn" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" value="${user.nisn}">
                    </div>
                    <div class="mb-3 text-left">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1"><i class="fas fa-key text-rose-500 mr-1"></i> Password</label>
                        <input id="swal-edit-pass" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" value="${user.password}">
                    </div>
                    ${kelasHtml}
                </div>
            `,
            focusConfirm: false,
            showCancelButton: true,
            confirmButtonText: '<i class="fas fa-save mr-1"></i> Update Data',
            cancelButtonText: 'Batal',
            confirmButtonColor: '#2563eb',
            cancelButtonColor: '#94a3b8',
            customClass: { popup: 'rounded-2xl', confirmButton: 'rounded-xl', cancelButton: 'rounded-xl' },
            preConfirm: () => {
                user.nama = document.getElementById('swal-edit-nama').value;
                user.nisn = document.getElementById('swal-edit-nisn').value;
                user.username = document.getElementById('swal-edit-nisn').value; // Sync username
                user.kelas = document.getElementById('swal-edit-kelas').value;
                user.password = document.getElementById('swal-edit-pass').value;
                if(currentUser && currentUser.id === user.id) { currentUser.password = user.password; currentUser.nama = user.nama; }
            }
        }).then((result) => {
            if(result.isConfirmed) {
                Swal.fire({icon: 'success', title: 'Terupdate', text: 'Perubahan berhasil disimpan.', timer: 1500, showConfirmButton: false});
                changeView('admin-users');
            }
        });
    };

    window.downloadTemplate = function() {
        const ws_data = [
            ["NISN", "Nama Siswa", "Kelas", "No Absen", "Tahun Pelajaran", "Foto"],
            ["0012345678", "Siswa Teladan Satu", "7A", "1", "2026/2027", ""],
            ["0087654321", "Siswa Teladan Dua", "8B", "2", "2026/2027", ""],
            ["0011223344", "Siswa Teladan Tiga", "9C", "3", "2026/2027", ""]
        ];
        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Template_Data");
        XLSX.writeFile(wb, "Template_Data_Anggota_SAWAH.xlsx");

        Swal.fire({ icon: 'success', title: 'Berhasil!', html: '<p class="text-sm text-slate-600">Template <b>Excel (.xlsx)</b> berhasil diunduh.</p>', confirmButtonColor: '#10b981' });
    };

    window.showImportModal = function() {
        Swal.fire({
            title: '<div class="flex flex-col items-center"><span class="text-xl font-bold text-slate-800">Import Kolektif</span></div>',
            html: `
                <div class="text-center px-2 mt-2">
                    <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner"><i class="fas fa-file-excel text-3xl text-emerald-600"></i></div>
                    <p class="text-[13px] text-slate-500 mb-5 leading-relaxed">Unggah file Excel <b>(.xlsx)</b> yang telah diisi sesuai dengan template yang disediakan.</p>
                    <div class="relative bg-white border-2 border-dashed border-emerald-300 rounded-xl p-6 hover:bg-emerald-50 transition cursor-pointer group overflow-hidden shadow-sm">
                        <input type="file" accept=".xlsx, .xls" id="file-import" class="absolute top-0 left-0 w-full h-full opacity-0 cursor-pointer z-10" 
                            onchange="let fn = this.files[0] ? this.files[0].name : 'Maksimal ukuran file: 5MB'; let el = document.getElementById('file-name-display'); el.innerText = fn; el.classList.add('text-emerald-600', 'font-bold'); el.classList.remove('text-slate-400');">
                        <i class="fas fa-cloud-upload-alt text-4xl text-slate-300 group-hover:text-emerald-500 group-hover:-translate-y-1 transform transition duration-300 mb-3"></i>
                        <h4 class="text-sm font-bold text-slate-700 group-hover:text-emerald-600 transition">Ketuk untuk Memilih File</h4>
                        <p class="text-[11px] text-slate-400 mt-1" id="file-name-display">Maksimal ukuran file: 5MB</p>
                    </div>
                </div>
            `,
            showCancelButton: true,
            confirmButtonText: '<i class="fas fa-upload mr-1"></i> Proses Import',
            cancelButtonText: 'Batal',
            confirmButtonColor: '#10b981',
            preConfirm: () => {
                const fileInput = document.getElementById('file-import');
                if (!fileInput.files.length) { Swal.showValidationMessage('Pilih file Excel terlebih dahulu!'); return false; }
                return fileInput.files[0];
            }
        }).then((res) => {
            if(res.isConfirmed && res.value) {
                const reader = new FileReader();
                Swal.fire({ title: 'Memproses...', didOpen: () => { Swal.showLoading(); } });
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const json = XLSX.utils.sheet_to_json(worksheet);
                        
                        if(json.length === 0) return Swal.fire('Gagal', 'File Excel kosong.', 'error');

                        let count = 0;
                        json.forEach((row, index) => {
                            if(row['Nama Siswa'] && row['NISN']) {
                                dummyUsers.unshift({
                                    id: 'u_import_' + new Date().getTime() + '_' + index,
                                    username: String(row['NISN']), password: '123456', role: 'Siswa',
                                    nama: row['Nama Siswa'], kelas: row['Kelas'] || '-', nisn: String(row['NISN']), face_registered: false
                                });
                                count++;
                            }
                        });
                        if(count > 0) {
                            Swal.fire({ icon: 'success', title: 'Berhasil!', text: `${count} siswa ditambahkan.`, timer: 2000, showConfirmButton: false });
                            changeView('admin-users'); 
                        } else { Swal.fire('Gagal', 'Data tidak valid.', 'error'); }
                    } catch (err) { Swal.fire('Error', 'Gagal membaca file.', 'error'); }
                };
                reader.readAsArrayBuffer(res.value);
            }
        });
    };

    function handleLogin(e) {
        e.preventDefault();
        const userVal = document.getElementById('username').value;
        const passVal = document.getElementById('password').value;
        showLoading('Memverifikasi...');

        if (IS_PREVIEW) {
            setTimeout(() => {
                const user = dummyUsers.find(u => u.username === userVal && u.password === passVal);

                else { Swal.fire({ icon: 'error', title: 'Gagal', text: 'Username atau Password salah!' }); }
            }, 800);
        } else {
            fetch(GAS_URL, { method: 'POST', body: new URLSearchParams({ action: 'login', username: userVal, password: passVal }) })
            .then(res => res.json())
            .then(data => {
                if(data.success) { currentUser = data.user; Swal.fire('Berhasil', '', 'success'); renderApp(); } 
                else { Swal.fire('Gagal', data.message, 'error'); }
            }).catch(err => Swal.fire('Error', 'Gagal server', 'error'));
        }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }

    function changeView(viewName) {
        document.querySelectorAll('.nav-item').forEach(el => { el.classList.remove('bg-slate-800', 'text-white', 'shadow-inner'); el.classList.add('text-slate-300'); });
        const activeItem = document.querySelector(`.nav-item[data-view="${viewName}"]`);
        if(activeItem) { activeItem.classList.add('bg-slate-800', 'text-white', 'shadow-inner'); activeItem.classList.remove('text-slate-300'); }
        if(window.innerWidth < 768) { const sidebar = document.getElementById('sidebar'); if(!sidebar.classList.contains('hidden')) toggleSidebar(); }
        loadView(viewName);
    }

    function loadView(viewName) {
        const content = document.getElementById('main-content');
        const headerTitle = document.getElementById('header-title');
        
        if(stream) { stream.getTracks().forEach(track => track.stop()); stream = null; }
        if(activeInterval) { clearInterval(activeInterval); activeInterval = null; }

        switch(viewName) {
            case 'profil': headerTitle.innerText = "Pengaturan Profil Pribadi"; content.innerHTML = renderProfil(); break;
            case 'admin-dashboard':
                headerTitle.innerText = currentUser.role === 'Wali' ? "Dashboard Wali Kelas " + currentUser.kelas : "Ringkasan Sistem Utama";
                content.innerHTML = renderAdminDashboard();
                activeInterval = setInterval(() => { const clock = document.getElementById('live-clock'); if(clock) clock.innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
                break;
            case 'admin-users': headerTitle.innerText = currentUser.role === 'Admin' ? "Kelola Data Anggota" : (currentUser.role === 'Wali' ? "Data Siswa Kelas " + currentUser.kelas : "Direktori Seluruh Siswa"); content.innerHTML = renderAdminUsers(); break;
            case 'admin-absensi': headerTitle.innerText = "Data & Laporan Absensi"; content.innerHTML = renderAdminAbsensi(); break;
            case 'admin-lokasi': headerTitle.innerText = "Manajemen Area Absensi (GPS)"; content.innerHTML = renderAdminLokasi(); setTimeout(initMap, 300); break;
            case 'admin-izin': headerTitle.innerText = "Validasi Keterangan Tidak Hadir"; content.innerHTML = renderAdminIzin(); break;
            case 'wali-izin': headerTitle.innerText = "Validasi Izin Kelas " + currentUser.kelas; content.innerHTML = renderAdminIzin(); break;
            case 'admin-waktu': headerTitle.innerText = "Pengaturan Jam Operasional"; content.innerHTML = renderAdminWaktu(); break;
            case 'siswa-scan': headerTitle.innerText = "Pindai Wajah Kehadiran"; content.innerHTML = renderSiswaScan(); break;
            case 'siswa-wajah': headerTitle.innerText = "Registrasi Pola Wajah"; content.innerHTML = renderSiswaWajah(); break;
            case 'siswa-izin': headerTitle.innerText = "Formulir Izin / Sakit"; content.innerHTML = renderSiswaIzin(); break;
            case 'siswa-riwayat': headerTitle.innerText = "Histori Kehadiran Saya"; content.innerHTML = renderSiswaRiwayat(); break;
            case 'laporan-absensi': headerTitle.innerText = "Laporan Absensi Global"; content.innerHTML = renderAdminAbsensi(); break;
        }
    }

    function renderAdminDashboard() {
        let mySiswa = dummyUsers.filter(u => u.role === 'Siswa');

    function initMap() {
        const mapEl = document.getElementById('map-picker'); if (!mapEl) return;
        const defaultLat = -8.5361; const defaultLon = 115.4215;
        if (mapInstance !== null) { mapInstance.off(); mapInstance.remove(); mapInstance = null; }

        mapInstance = L.map('map-picker').setView([defaultLat, defaultLon], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
        document.getElementById('lat').value = defaultLat; document.getElementById('lon').value = defaultLon;

        const icon = L.icon({ iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png', shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png', iconAnchor: [12, 41] });
        mapMarker = L.marker([defaultLat, defaultLon], {draggable: true, icon: icon}).addTo(mapInstance);

        mapMarker.on('dragend', function (e) { const pos = mapMarker.getLatLng(); document.getElementById('lat').value = pos.lat.toFixed(6); document.getElementById('lon').value = pos.lng.toFixed(6); });
        mapInstance.on('click', function (e) { mapMarker.setLatLng(e.latlng); document.getElementById('lat').value = e.latlng.lat.toFixed(6); document.getElementById('lon').value = e.latlng.lng.toFixed(6); });
        setTimeout(() => { mapInstance.invalidateSize(); }, 400);
    }

    function getGPSCurrent(btn) {
        const originalContent = btn.innerHTML; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Mencari...';
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude; const lon = pos.coords.longitude;
                    document.getElementById('lat').value = lat.toFixed(6); document.getElementById('lon').value = lon.toFixed(6);
                    if (mapInstance && mapMarker) { const newLatLng = new L.LatLng(lat, lon); mapMarker.setLatLng(newLatLng); mapInstance.setView(newLatLng, 18); }
                    btn.innerHTML = '<i class="fas fa-check text-emerald-600 mr-2"></i>Ditemukan'; setTimeout(() => { btn.innerHTML = originalContent; }, 3000);
                },
                (err) => { Swal.fire('Error', 'Izin lokasi ditolak/tidak aktif.', 'error'); btn.innerHTML = originalContent; },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else { Swal.fire('Error', 'GPS tidak didukung', 'error'); btn.innerHTML = originalContent; }
    }

    function startCameraAndGPS() {
        const video = document.getElementById('webcam'); if(!video) return; 
        const placeholder = document.getElementById('camera-placeholder'); const guide = document.getElementById('guide-frame');
        const btnIn = document.getElementById('btn-in'); const btnOut = document.getElementById('btn-out'); const gpsStatus = document.getElementById('gps-status');

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const distance = calculateDistance(pos.coords.latitude, pos.coords.longitude, dummyLokasi[0].lat, dummyLokasi[0].lon);
                if (IS_PREVIEW || distance <= dummyLokasi[0].radius) {
                    gpsStatus.innerHTML = '<i class="fas fa-check-circle mr-1"></i> GPS Valid'; gpsStatus.className = 'absolute top-5 right-5 text-[10px] uppercase font-bold bg-emerald-500 text-white px-2.5 py-1 rounded-full shadow-md flex items-center';
                    placeholder.innerHTML = `<i class="fas fa-camera text-5xl mb-4 text-slate-600"></i><p class="text-sm font-medium">Membuka Kamera...</p>`;
                    initCamera(video, placeholder, guide, btnIn, btnOut);
                } else {
                    gpsStatus.innerHTML = '<i class="fas fa-times-circle mr-1"></i> Luar Zona'; gpsStatus.className = 'absolute top-5 right-5 text-[10px] uppercase font-bold bg-rose-500 text-white px-2.5 py-1 rounded-full shadow-md flex items-center';
                    placeholder.innerHTML = `<i class="fas fa-map-marked-alt text-5xl mb-4 text-rose-500"></i><p class="text-sm font-bold text-rose-500">Terdeteksi di Luar Area Sekolah.</p><p class="text-xs text-slate-500 mt-1">Jarak: ${Math.round(distance)} meter dari titik acuan.</p>`;
                }
            },
            (err) => {
                gpsStatus.innerHTML = '<i class="fas fa-exclamation-triangle mr-1"></i> GPS Mati'; gpsStatus.className = 'absolute top-5 right-5 text-[10px] uppercase font-bold bg-rose-500 text-white px-2.5 py-1 rounded-full shadow-md flex items-center';
                placeholder.innerHTML = `<i class="fas fa-location-arrow text-5xl mb-4 text-rose-500"></i><p class="text-sm font-bold text-rose-500">Izin Lokasi (GPS) Ditolak.</p><p class="text-xs text-slate-500 mt-1">Sistem butuh GPS untuk mencegah kecurangan.</p>`;
                if(IS_PREVIEW) initCamera(video, placeholder, guide, btnIn, btnOut); 
            }, { enableHighAccuracy: true }
        );
    }

    function initCamera(video, placeholder, guide, btnIn, btnOut) {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then((s) => {
                stream = s; video.srcObject = stream; video.classList.remove('hidden'); placeholder.classList.add('hidden'); guide.classList.remove('hidden');
                btnIn.disabled = false; btnIn.classList.remove('opacity-50', 'cursor-not-allowed'); btnOut.disabled = false; btnOut.classList.remove('opacity-50', 'cursor-not-allowed');
                document.getElementById('liveness-instruction').innerText = "Kamera Siap, Silakan Tekan Tombol.";
            }).catch((err) => { placeholder.innerHTML = `<i class="fas fa-video-slash text-5xl mb-4 text-rose-500"></i><p class="text-sm font-bold text-rose-500">Akses Kamera Ditolak.</p>`; });
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180; const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function processScan(type) {
        const video = document.getElementById('webcam'); const instruction = document.getElementById('liveness-instruction'); const scanLine = document.getElementById('scan-line-anim');
        const challenges = ["Silakan Tersenyum", "Toleh Ke Kiri Sedikit", "Kedipkan Mata Anda"];
        const randomChallenge = challenges[Math.floor(Math.random() * challenges.length)];
        
        scanLine.classList.remove('hidden'); instruction.innerHTML = `<span class="text-amber-300 animate-pulse">${randomChallenge}</span>`;
        document.getElementById('btn-in').disabled = true; document.getElementById('btn-out').disabled = true;

        setTimeout(() => {
            instruction.innerHTML = `<span class="text-emerald-400"><i class="fas fa-check-circle"></i> Wajah Terverifikasi Asli</span>`;
            const canvas = document.createElement('canvas'); canvas.width = 320; canvas.height = 240; 
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            saveAttendance(type, canvas.toDataURL('image/jpeg', 0.5));
        }, 2000);
    }

    function saveAttendance(type, base64Image) {
        document.getElementById('scan-line-anim').classList.add('hidden'); document.getElementById('liveness-instruction').innerText = "Kamera Siap.";
        document.getElementById('btn-in').disabled = false; document.getElementById('btn-out').disabled = false;

        if (IS_PREVIEW) {
            Swal.fire({ icon: 'success', title: `Scan ${type} Berhasil!`, html: `<p class="text-slate-600 font-medium">Tercatat: ${new Date().toLocaleTimeString('id-ID')}</p><img src="${base64Image}" class="mt-4 rounded-xl mx-auto w-48 border-4 border-emerald-100 shadow-md">`, confirmButtonColor: '#10b981' });
            if(type === 'IN') dummyAbsensi.unshift({ id: 'a2', id_user: currentUser.id, nama: currentUser.nama, kelas: currentUser.kelas, tanggal: new Date().toISOString().split('T')[0], waktu_in: new Date().toLocaleTimeString('id-ID'), waktu_out: '-', status: 'Hadir' });
        } else {
            showLoading(`Sinkronisasi...`);
            fetch(GAS_URL, { method: 'POST', body: new URLSearchParams({ action: 'scan', type: type, id_user: currentUser.id, image: base64Image }) })
            .then(res => res.json()).then(data => { if(data.success) Swal.fire('Terkonfirmasi', `Absen ${type} sukses.`, 'success'); else Swal.fire('Ditolak', data.message, 'error'); })
            .catch(err => Swal.fire('Error', 'Gagal koneksi database.', 'error'));
        }
    }

    function renderSiswaWajah() {
         return `<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-100 text-center"><div class="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6 relative"><i class="fas fa-user-check text-4xl text-emerald-600"></i><div class="absolute -bottom-2 -right-2 bg-emerald-500 text-white w-8 h-8 rounded-full flex items-center justify-center border-2 border-white"><i class="fas fa-check text-sm"></i></div></div><h3 class="text-2xl font-bold text-slate-800 mb-2">Wajah Terekam</h3><p class="text-slate-500 text-sm mb-8 leading-relaxed">Pola data geometrik wajah Anda telah tersimpan dan terenkripsi di server pusat.</p><button disabled class="bg-slate-100 text-slate-400 py-3 w-full rounded-xl font-bold cursor-not-allowed border border-slate-200">Perekaman Selesai</button></div>`;
    }

    function renderSiswaRiwayat() {
        const myAbsen = dummyAbsensi.filter(a => a.id_user === currentUser.id);
        let rows = myAbsen.map(a => `
            <tr class="border-b border-slate-100 hover:bg-slate-50"><td class="px-5 py-4 text-sm font-medium text-slate-700">${a.tanggal}</td><td class="px-5 py-4 text-sm font-bold text-emerald-600"><i class="fas fa-sign-in-alt text-xs mr-1 opacity-50"></i> ${a.waktu_in}</td><td class="px-5 py-4 text-sm font-bold text-rose-600"><i class="fas fa-sign-out-alt text-xs mr-1 opacity-50"></i> ${a.waktu_out}</td><td class="px-5 py-4 text-sm"><span class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full text-xs font-bold">${a.status}</span></td></tr>`).join('');
        if(rows === '') rows = '<tr><td colspan="4" class="text-center py-8 text-slate-400 font-medium">Belum ada riwayat absensi.</td></tr>';

        return `<div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100"><div class="bg-slate-900 p-5 text-white flex justify-between items-center shadow-inner"><h3 class="text-lg font-bold"><i class="fas fa-history text-blue-400 mr-2"></i> Log Kehadiran Anda</h3><button onclick="mockAction('Download PDF')" class="bg-slate-800 hover:bg-slate-700 text-xs px-3 py-1.5 rounded-lg border border-slate-700 transition">Download PDF</button></div><div class="overflow-x-auto custom-scroll"><table class="w-full text-left"><thead class="bg-slate-50 border-b border-slate-200"><tr><th class="px-5 py-3 text-xs uppercase tracking-wider font-bold text-slate-500">Tanggal</th><th class="px-5 py-3 text-xs uppercase tracking-wider font-bold text-slate-500">Scan Masuk</th><th class="px-5 py-3 text-xs uppercase tracking-wider font-bold text-slate-500">Scan Keluar</th><th class="px-5 py-3 text-xs uppercase tracking-wider font-bold text-slate-500">Keterangan</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    }
</script>
