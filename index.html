<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAWAH - SPENSADA Absensi Wajah</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Face-API.js -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- JSQR Scanner -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        
        /* FIX BUG: Memastikan Pop Up Alert selalu di atas dan bisa diklik */
        .swal2-container { z-index: 999999 !important; pointer-events: auto !important; }
        .swal2-popup { pointer-events: auto !important; }
        
        .scan-line {
            width: 100%; height: 4px; background: rgba(59, 130, 246, 0.8);
            position: absolute; top: 0; left: 0;
            animation: scan 2s infinite linear;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.8);
        }
        @keyframes scan {
            0% { top: 0; } 50% { top: 100%; } 100% { top: 0; }
        }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-gray-800 antialiased overflow-hidden">

<script>
    // ==========================================
    // KEAMANAN APLIKASI
    // ==========================================
    document.addEventListener('contextmenu', event => event.preventDefault()); 
    document.addEventListener('keydown', function(e) {
        if(e.keyCode == 123) { e.preventDefault(); return false; } 
        if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) { e.preventDefault(); return false; } 
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { e.preventDefault(); return false; } 
    });

    // ==========================================
    // KONFIGURASI APLIKASI
    // ==========================================
    const IS_PREVIEW = false; // Ganti ke false saat di-deploy ke Blogger
    
    // WAJIB ISI DENGAN URL DEPLOYMENT GAS TERBARU ANDA
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxXDOSul2szRarGcWxmvVFQ_SYhcVsHZo_e6mtcqjo7fOzkUPFynW6fOuEdRq0DmgwUUA/exec"; 
    
    const APP_LOGO = "https://i.imghippo.com/files/Qvgj6380ctk.png";

    const Toast = Swal.mixin({
        toast: true, position: 'top-end', showConfirmButton: false,
        timer: 3000, timerProgressBar: true
    });

    let dummyUsers = [];
    let dummyAbsensi = [];
    let dummyIzin = [];
    let dummyPengaturan = { scan_in_start: '06:00', scan_in_end: '07:15', scan_out_start: '14:00', scan_out_end: '16:00' };

    let currentActiveView = '';
    let dataPollingInterval;

    // --- FUNGSI AUTO REFRESH (REAL TIME) ---
    function startDataPolling() {
        if(dataPollingInterval) clearInterval(dataPollingInterval);
        dataPollingInterval = setInterval(() => {
            if(!currentUser) return;
            fetch(GAS_URL, {
                method: 'POST', body: JSON.stringify({ action: 'getData' })
            }).then(r => r.json()).then(data => {
                if(data.success) {
                    dummyUsers = data.data.users || dummyUsers;
                    dummyAbsensi = data.data.absensi || dummyAbsensi;
                    dummyIzin = data.data.izin || dummyIzin;
                    refreshCurrentViewSoftly();
                }
            }).catch(e => console.log('Polling Error'));
        }, 15000); 
    }

    function refreshCurrentViewSoftly() {
        if (currentActiveView === 'admin-absensi' || currentActiveView === 'laporan-absensi') updateTableAbsensi();
        else if (currentActiveView === 'admin-izin' || currentActiveView === 'wali-izin') updateTableIzin();
    }

    window.manualRefreshData = function() {
        const btn = document.getElementById('btn-manual-refresh');
        if(btn) btn.classList.add('animate-spin');
        
        fetch(GAS_URL, {
            method: 'POST', body: JSON.stringify({ action: 'getData' })
        }).then(r => r.json()).then(data => {
            if(data.success) {
                dummyUsers = data.data.users || dummyUsers;
                dummyAbsensi = data.data.absensi || dummyAbsensi;
                dummyIzin = data.data.izin || dummyIzin;
                refreshCurrentViewSoftly();
                Toast.fire({ icon: 'success', title: 'Data Mutakhir Ditarik' });
            }
        }).finally(() => {
            if(btn) btn.classList.remove('animate-spin');
        });
    };

    // --- FUNGSI LIHAT GAMBAR & IZIN ---
    window.lihatBuktiWajah = function(id_absen) {
        Swal.fire({ title: 'Memuat Bukti Wajah...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        fetch(GAS_URL, {
            method: 'POST', body: JSON.stringify({ action: 'getFotoAbsensi', id: id_absen })
        }).then(r => r.json()).then(res => {
            if(res.success) {
                let imgHtml = '';
                if(res.foto_in && res.foto_in !== '-') imgHtml += `<div class="mb-3"><p class="text-xs font-bold text-slate-500 mb-1">Scan Masuk</p><img src="${res.foto_in}" class="w-full rounded-lg border-2 border-emerald-100 shadow-sm"></div>`;
                if(res.foto_out && res.foto_out !== '-') imgHtml += `<div><p class="text-xs font-bold text-slate-500 mb-1">Scan Keluar</p><img src="${res.foto_out}" class="w-full rounded-lg border-2 border-rose-100 shadow-sm"></div>`;
                if(imgHtml === '') imgHtml = '<p class="text-slate-500">Foto tidak ditemukan di server.</p>';

                Swal.fire({ title: 'Bukti Pindai Wajah', html: `<div class="max-h-[60vh] overflow-y-auto">${imgHtml}</div>`, confirmButtonText: 'Tutup', confirmButtonColor: '#3b82f6' });
            } else Swal.fire('Gagal', res.message, 'error');
        }).catch(e => Swal.fire('Error', 'Koneksi lambat.', 'error'));
    };

    window.lihatLampiranIzin = function(id_izin) {
        Swal.fire({ title: 'Membuka Lampiran...', didOpen: () => Swal.showLoading() });
        fetch(GAS_URL, {
            method: 'POST', body: JSON.stringify({ action: 'getFotoIzin', id: id_izin })
        }).then(r=>r.json()).then(res => {
            if(res.success && res.file && res.file !== '-') {
                let html = (res.file.includes('application/pdf') || res.file.includes('data:application/pdf')) 
                    ? `<embed src="${res.file}" width="100%" height="400px" type="application/pdf">`
                    : `<img src="${res.file}" class="w-full rounded-lg shadow-sm">`;
                Swal.fire({ title: 'Lampiran Surat', html: html, confirmButtonText: 'Tutup', width: '600px' });
            } else Swal.fire('Info', 'Tidak ada lampiran terlampir.', 'info');
        }).catch(e => Swal.fire('Error', 'Gagal memuat lampiran.', 'error'));
    };

    window.submitIzin = function() {
        const kategori = document.getElementById('izin-kategori').value;
        const dari = document.getElementById('izin-dari').value;
        const sampai = document.getElementById('izin-sampai').value;
        const alasan = document.getElementById('izin-alasan').value;
        const fileInput = document.getElementById('izin-file');
        
        if(!fileInput.files[0]) return Swal.fire('Peringatan', 'Lampiran bukti/surat wajib diunggah!', 'warning');
        if(fileInput.files[0].size > 2 * 1024 * 1024) return Swal.fire('Ditolak', 'Ukuran foto maksimal 2 MB agar server tidak penuh.', 'error');
        
        const btn = document.getElementById('btn-kirim-izin');
        const oText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Mengirim data...'; btn.disabled = true;

        const reader = new FileReader();
        reader.onload = function(e) {
            fetch(GAS_URL, {
                method: 'POST', body: JSON.stringify({ action: 'addIzin', data: { id_user: currentUser.id, nama: currentUser.nama, kelas: currentUser.kelas, jenis: kategori.includes('Sakit') ? 'Sakit' : 'Izin', dari: dari, sampai: sampai, alasan: alasan, file: e.target.result } })
            }).then(r => r.json()).then(res => {
                if(res.success) {
                    Swal.fire('Terkirim!', 'Pengajuan diteruskan ke Wali Kelas', 'success');
                    document.getElementById('izin-form').reset();
                    dummyIzin.unshift(res.data);
                } else Swal.fire('Gagal', res.message, 'error');
            }).finally(() => { btn.innerHTML = oText; btn.disabled = false; });
        };
        reader.readAsDataURL(fileInput.files[0]);
    };

    window.updateIzin = function(id, status) {
        Swal.fire({title: 'Menyimpan...', didOpen: () => Swal.showLoading()});
        fetch(GAS_URL, {
            method: 'POST', body: JSON.stringify({ action: 'updateIzin', data: { id: id, status: status } })
        }).then(r=>r.json()).then(res => {
            if(res.success) {
                let item = dummyIzin.find(i => i.id === id);
                if(item) item.status = status;
                Toast.fire({ icon: 'success', title: `Status menjadi: ${status}` });
                updateTableIzin();
            } else Swal.fire('Gagal', res.message, 'error');
        });
    };

    window.deleteAllData = function(type) {
        Swal.fire({
            title: `Kosongkan Data ${type}?`,
            text: `Data yang dihapus dari Database permanen dan tidak bisa dikembalikan!`,
            icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', cancelButtonColor: '#94a3b8', confirmButtonText: 'Ya, Kosongkan!'
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire({title: 'Menghapus...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
                fetch(GAS_URL, {
                    method: 'POST', body: JSON.stringify({ action: 'deleteAllData', type: type })
                }).then(r => r.json()).then(res => {
                    Swal.close();
                    if(res.success) {
                        if(type === 'anggota') dummyUsers = dummyUsers.filter(u => u.role !== 'Siswa');
                        else if(type === 'absensi') dummyAbsensi = [];
                        else if(type === 'izin') dummyIzin = [];
                        
                        Toast.fire({ icon: 'success', title: 'Data berhasil dikosongkan!' });
                        changeView(currentActiveView);
                    } else Swal.fire('Gagal', res.message, 'error');
                });
            }
        });
    };

    window.deleteSingle = function(id, type) {
         Swal.fire({ title: 'Hapus Item Ini?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Hapus' }).then(res => {
             if(res.isConfirmed) {
                 let sheetName = type === 'user' ? 'Users' : 'Lokasi';
                 Swal.fire({title: 'Memproses...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
                 fetch(GAS_URL, {
                     method: 'POST', body: JSON.stringify({ action: 'deleteData', sheet: sheetName, id: id })
                 }).then(r => r.json()).then(response => {
                     Swal.close();
                     if(response.success) {
                         if(type==='user') dummyUsers = dummyUsers.filter(u => u.id !== id);
                         Toast.fire({ icon: 'success', title: 'Item berhasil dihapus.' });
                         changeView(currentActiveView);
                     } else Swal.fire('Gagal', response.message, 'error');
                 });
             }
         });
    };

    window.filterUsers = function() {
        let keyword = document.getElementById('search-users') ? document.getElementById('search-users').value.toLowerCase() : '';
        let kelas = document.getElementById('filter-kelas-user') ? document.getElementById('filter-kelas-user').value : '';
        let rows = document.querySelectorAll(`#table-users tbody tr`);
        rows.forEach(row => {
            if(row.children.length === 1) return; 
            let text = row.innerText.toLowerCase();
            let rowKelas = row.children[4] ? row.children[4].innerText : ''; 
            row.style.display = (text.includes(keyword) && (kelas === "" || rowKelas === kelas)) ? '' : 'none';
        });
    };

    window.showAddUserModal = function() {
        Swal.fire({
            title: '<div class="flex flex-col items-center"><div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-2 shadow-inner"><i class="fas fa-user-plus text-2xl"></i></div><span class="text-xl font-bold text-slate-800">Tambah Anggota</span></div>',
            html: `
                <div class="text-left px-2 mt-4">
                    <p class="text-xs text-slate-500 mb-4 text-center">Password default akun baru: <b>123456</b></p>
                    <div class="mb-3">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1"><i class="fas fa-user-circle text-blue-500 mr-1"></i> Nama Lengkap</label>
                        <input id="swal-nama" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" placeholder="Contoh: Budi Santoso" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1"><i class="fas fa-id-card text-emerald-500 mr-1"></i> NISN / NIP</label>
                        <input id="swal-nisn" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" placeholder="Ketik nomor identitas..." required>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-1">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1"><i class="fas fa-user-shield text-purple-500 mr-1"></i> Akses</label>
                            <select id="swal-role" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"><option value="Siswa">Siswa</option><option value="Wali">Wali Kelas</option><option value="Admin">Admin</option></select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1"><i class="fas fa-chalkboard text-amber-500 mr-1"></i> Kelas</label>
                            <select id="swal-kelas" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"><option value="-">Kosongkan</option><optgroup label="Kelas 7"><option value="7A">7A</option><option value="7B">7B</option><option value="7C">7C</option></optgroup><optgroup label="Kelas 8"><option value="8A">8A</option><option value="8B">8B</option></optgroup><optgroup label="Kelas 9"><option value="9A">9A</option><option value="9B">9B</option></optgroup></select>
                        </div>
                    </div>
                </div>
            `,
            focusConfirm: false, showCancelButton: true, confirmButtonText: '<i class="fas fa-save mr-1"></i> Simpan', cancelButtonText: 'Batal',
            confirmButtonColor: '#2563eb', customClass: { popup: 'rounded-2xl', confirmButton: 'rounded-xl', cancelButton: 'rounded-xl' },
            preConfirm: () => { return { nama: document.getElementById('swal-nama').value, nisn: document.getElementById('swal-nisn').value, role: document.getElementById('swal-role').value, kelas: document.getElementById('swal-kelas').value } }
        }).then((result) => {
            if (result.isConfirmed) {
                let v = result.value;
                if(!v.nama) return Swal.fire('Gagal', 'Nama wajib diisi!', 'error');
                
                Swal.fire({title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
                fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'addUser', data: v }) })
                .then(r => r.json()).then(res => {
                    Swal.close();
                    if(res.success) {
                        v.id = res.newId; v.username = v.nisn; v.password = '123456';
                        dummyUsers.unshift(v); Toast.fire({ icon: 'success', title: 'Tersimpan.' });
                        changeView('admin-users'); 
                    } else Swal.fire('Gagal', res.message, 'error');
                });
            }
        });
    };

    window.showEditUserModal = function(id) {
        let user = dummyUsers.find(u => u.id === id);
        if(!user) return;
        
        let kelasHtml = '';
        if (user.role === 'Wali' || user.role === 'Siswa') {
            const klsList = ['7A','7B','7C','7D','7E','7F','7G', '8A','8B','8C','8D','8E','8F','8G', '9A','9B','9C','9D','9E','9F','9G'];
            let options = klsList.map(c => `<option value="${c}" ${user.kelas === c ? 'selected' : ''}>${c}</option>`).join('');
            kelasHtml = `<div class="mb-3 text-left"><label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1"><i class="fas fa-chalkboard text-amber-500 mr-1"></i> Kelas</label><select id="swal-edit-kelas" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"><option value="-" ${user.kelas === '-' ? 'selected' : ''}>- Pilih Kelas -</option>${options}</select></div>`;
        } else { kelasHtml = `<input type="hidden" id="swal-edit-kelas" value="${user.kelas}">`; }
        
        Swal.fire({
            title: '<div class="text-xl font-bold text-slate-800">Edit Data Anggota</div>',
            html: `
                <div class="px-2 mt-4 text-left">
                    <div class="mb-3 text-left"><label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Nama Lengkap</label><input id="swal-edit-nama" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" value="${user.nama}"></div>
                    <div class="mb-3 text-left"><label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">NISN / NIP</label><input id="swal-edit-nisn" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" value="${user.nisn}"></div>
                    <div class="mb-3 text-left"><label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Password</label><input id="swal-edit-pass" class="w-full border-slate-200 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" value="${user.password}"></div>
                    ${kelasHtml}
                </div>`,
            focusConfirm: false, showCancelButton: true, confirmButtonText: '<i class="fas fa-save mr-1"></i> Update', cancelButtonText: 'Batal',
            confirmButtonColor: '#2563eb', customClass: { popup: 'rounded-2xl', confirmButton: 'rounded-xl', cancelButton: 'rounded-xl' },
            preConfirm: () => { return { id: user.id, nama: document.getElementById('swal-edit-nama').value, nisn: document.getElementById('swal-edit-nisn').value, kelas: document.getElementById('swal-edit-kelas').value, password: document.getElementById('swal-edit-pass').value } }
        }).then((result) => {
            if(result.isConfirmed) {
                Swal.fire({title: 'Memperbarui...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
                fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'updateUser', data: result.value }) })
                .then(r => r.json()).then(res => {
                    Swal.close();
                    if(res.success) {
                        user.nama = result.value.nama; user.nisn = result.value.nisn; user.username = result.value.nisn; user.kelas = result.value.kelas; user.password = result.value.password;
                        if(currentUser && currentUser.id === result.value.id) { currentUser.password = result.value.password; currentUser.nama = result.value.nama; }
                        Toast.fire({ icon: 'success', title: 'Tersimpan.' }); changeView('admin-users');
                    } else Swal.fire('Gagal', res.message, 'error');
                });
            }
        });
    };

    window.downloadTemplate = function() {
        const ws_data = [ ["NISN", "Nama Siswa", "Kelas", "No Absen", "Tahun Pelajaran"], ["0012345678", "Siswa Teladan Satu", "7A", "1", "2026/2027"], ["0087654321", "Siswa Teladan Dua", "8B", "2", "2026/2027"] ];
        const ws = XLSX.utils.aoa_to_sheet(ws_data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Template_Data");
        XLSX.writeFile(wb, "Template_Data_Anggota_SAWAH.xlsx");
    };

    window.showImportModal = function() {
        Swal.fire({
            title: '<div class="flex flex-col items-center"><span class="text-xl font-bold text-slate-800">Import Kolektif</span></div>',
            html: `
                <div class="text-center px-2 mt-2">
                    <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner"><i class="fas fa-file-excel text-3xl text-emerald-600"></i></div>
                    <p class="text-[13px] text-slate-500 mb-5 leading-relaxed">Unggah file Excel <b>(.xlsx)</b> yang diisi sesuai template.</p>
                    <div class="relative bg-white border-2 border-dashed border-emerald-300 rounded-xl p-6 hover:bg-emerald-50 transition cursor-pointer group overflow-hidden shadow-sm">
                        <input type="file" accept=".xlsx, .xls" id="file-import" class="absolute top-0 left-0 w-full h-full opacity-0 cursor-pointer z-10" 
                            onchange="let fn = this.files[0] ? this.files[0].name : 'Maksimal ukuran file: 5MB'; let el = document.getElementById('file-name-display'); el.innerText = fn; el.classList.add('text-emerald-600', 'font-bold'); el.classList.remove('text-slate-400');">
                        <i class="fas fa-cloud-upload-alt text-4xl text-slate-300 group-hover:text-emerald-500 group-hover:-translate-y-1 transform transition duration-300 mb-3"></i>
                        <h4 class="text-sm font-bold text-slate-700 group-hover:text-emerald-600 transition">Pilih File</h4>
                        <p class="text-[11px] text-slate-400 mt-1" id="file-name-display">Maksimal 5MB</p>
                    </div>
                </div>
            `,
            showCancelButton: true, confirmButtonText: '<i class="fas fa-upload mr-1"></i> Import', cancelButtonText: 'Batal', confirmButtonColor: '#10b981',
            preConfirm: () => { const fileInput = document.getElementById('file-import'); if (!fileInput.files.length) { Swal.showValidationMessage('Pilih file Excel!'); return false; } return fileInput.files[0]; }
        }).then((res) => {
            if(res.isConfirmed && res.value) {
                const reader = new FileReader();
                Swal.fire({ title: 'Membaca File...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const json = XLSX.utils.sheet_to_json(worksheet, {raw: false});
                        if(json.length === 0) return Swal.fire('Gagal', 'File Excel kosong.', 'error');

                        let newUsers = [];
                        json.forEach((row) => {
                            if(row['Nama Siswa'] && row['NISN']) {
                                newUsers.push({ username: String(row['NISN']).trim(), password: '123456', role: 'Siswa', nama: row['Nama Siswa'], kelas: row['Kelas'] || '-', nisn: String(row['NISN']).trim() });
                            }
                        });
                        
                        if(newUsers.length > 0) {
                            Swal.fire({ title: 'Menyimpan ke Server...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'importUsers', users: newUsers }) })
                            .then(r => r.json()).then(resp => {
                                if(resp.success) {
                                    resp.imported.forEach(u => dummyUsers.unshift({ id: u[0], username: u[1], password: u[2], role: u[3], nama: u[4], kelas: u[5], nisn: u[6] }));
                                    Swal.fire({ icon: 'success', title: 'Berhasil!', text: `${newUsers.length} siswa diimport.`, timer: 2000, showConfirmButton: false });
                                    changeView('admin-users'); 
                                } else Swal.fire('Gagal', resp.message, 'error');
                            });
                        } else { Swal.fire('Gagal', 'Data tidak valid.', 'error'); }
                    } catch (err) { Swal.fire('Error', 'Gagal membaca file.', 'error'); }
                };
                reader.readAsArrayBuffer(res.value);
            }
        });
    };

    window.simpanProfil = function() {
        let hasChanges = false;
        let pData = { id: currentUser.id, nama: currentUser.nama, password: currentUser.password };

        let elPass = document.getElementById('prof-password');
        if (elPass && elPass.value.trim() !== '') { pData.password = elPass.value.trim(); hasChanges = true; }
        
        let elNama = document.getElementById('prof-nama');
        if (elNama && elNama.value.trim() !== '') { pData.nama = elNama.value.trim(); hasChanges = true; }

        let elFoto = document.getElementById('prof-foto');
        if (elFoto && elFoto.files.length > 0) {
            let file = elFoto.files[0];
            let reader = new FileReader();
            reader.onload = function(e) {
                pData.foto = e.target.result; 
                sendUpdateServer(pData, true);
            };
            reader.readAsDataURL(file);
        } else {
            if (hasChanges) sendUpdateServer(pData, false);
            else Toast.fire({ icon: 'info', title: 'Tidak ada perubahan data.' });
        }

        function sendUpdateServer(dataToSend, hasFoto) {
            const btn = document.getElementById('btn-simpan-profil'); const oText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Menyimpan...'; btn.disabled = true;

            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'updateUser', data: dataToSend }) })
            .then(r => r.json()).then(res => {
                if(res.success) {
                    currentUser.password = dataToSend.password; currentUser.nama = dataToSend.nama;
                    if(hasFoto) currentUser.foto = dataToSend.foto;
                    Toast.fire({ icon: 'success', title: 'Profil Diperbarui.' });
                    document.getElementById('header-name').innerText = currentUser.nama;
                    if(hasFoto) {
                        const avatarBox = document.querySelector('header .rounded-full.overflow-hidden');
                        if(avatarBox) avatarBox.innerHTML = `<img src="${dataToSend.foto}" class="w-full h-full object-cover">`;
                    }
                    setTimeout(() => { changeView('profil'); }, 300);
                } else Swal.fire('Gagal', res.message, 'error');
            }).finally(() => { btn.innerHTML = oText; btn.disabled = false; });
        }
    };

    function loadView(viewName) {
        const content = document.getElementById('main-content');
        const headerTitle = document.getElementById('header-title');
        
        // Membersihkan Memory Kamera saat pindah Menu
        stopMediaTracks(streamQR); streamQR = null;
        stopMediaTracks(streamFace); streamFace = null;
        if(qrScannerLoop) cancelAnimationFrame(qrScannerLoop); qrScannerLoop = null;
        
        if(activeInterval) { clearInterval(activeInterval); activeInterval = null; }

        switch(viewName) {
            case 'profil': headerTitle.innerText = "Pengaturan Profil Pribadi"; content.innerHTML = renderProfil(); break;
            case 'admin-dashboard':
                headerTitle.innerText = currentUser.role === 'Wali' ? "Dashboard Wali Kelas " + currentUser.kelas : "Ringkasan Sistem Utama";
                content.innerHTML = renderAdminDashboard();
                activeInterval = setInterval(() => { 
                    const clock = document.getElementById('live-clock'); 
                    if(clock) clock.innerText = new Date().toLocaleTimeString('id-ID'); 
                }, 1000);
                break;
            case 'admin-users': headerTitle.innerText = currentUser.role === 'Admin' ? "Kelola Data Anggota" : (currentUser.role === 'Wali' ? "Data Siswa Kelas " + currentUser.kelas : "Direktori Seluruh Siswa"); content.innerHTML = renderAdminUsers(); break;
            case 'admin-absensi': headerTitle.innerText = "Data & Laporan Absensi"; content.innerHTML = renderAdminAbsensi(); break;
            case 'admin-qrcode': headerTitle.innerText = "Generator QR Code Absensi"; content.innerHTML = renderAdminQRCode(); break;
            case 'admin-izin': headerTitle.innerText = "Validasi Keterangan Tidak Hadir"; content.innerHTML = renderAdminIzin(); break;
            case 'wali-izin': headerTitle.innerText = "Validasi Izin Kelas " + currentUser.kelas; content.innerHTML = renderAdminIzin(); break;
            case 'admin-waktu': headerTitle.innerText = "Pengaturan Jam Operasional"; content.innerHTML = renderAdminWaktu(); break;
            case 'siswa-scan': 
                // PERLINDUNGAN MAKSIMAL: Blokir menu absen jika belum rekam wajah
                if (currentUser.role === 'Siswa' && (!currentUser.foto || currentUser.foto.trim() === '')) {
                    Swal.fire({ icon: 'warning', title: 'Akses Terkunci', text: 'Anda belum memiliki data pola wajah. Silakan lakukan Perekaman Wajah terlebih dahulu.'});
                    changeView('siswa-wajah');
                    return; 
                }
                headerTitle.innerText = "Pindai Wajah Kehadiran"; 
                isQrVerified = false; 
                content.innerHTML = renderSiswaScan(); 
                break;
            case 'siswa-wajah': 
                headerTitle.innerText = "Registrasi Pola Wajah"; 
                content.innerHTML = renderSiswaWajah(); 
                if (!currentUser.foto || currentUser.foto.trim() === '') setTimeout(initKameraRegistrasi, 300);
                break;
            case 'siswa-izin': headerTitle.innerText = "Formulir Izin / Sakit"; content.innerHTML = renderSiswaIzin(); break;
            case 'siswa-riwayat': headerTitle.innerText = "Histori Kehadiran Saya"; content.innerHTML = renderSiswaRiwayat(); break;
            case 'laporan-absensi': headerTitle.innerText = "Laporan Absensi Global"; content.innerHTML = renderAdminAbsensi(); break;
        }
    }

    function startQRScanner() {
        const video = document.getElementById('webcam-qr'); if(!video) return;
        const placeholder = document.getElementById('qr-placeholder');
        const status = document.getElementById('gps-status'); 
        
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
            .then((s) => {
                streamQR = s; 
                video.srcObject = streamQR; 
                
                // Mencegah video blank pada beberapa HP
                video.onloadedmetadata = () => { video.play(); };
                
                video.classList.remove('hidden'); 
                placeholder.classList.add('hidden'); 
                document.getElementById('qr-scan-line-anim').classList.remove('hidden');
                
                status.innerHTML = '<i class="fas fa-qrcode mr-1"></i> Scan QR';
                status.className = 'absolute top-5 right-5 text-[10px] uppercase font-bold bg-indigo-500 text-white px-2.5 py-1 rounded-full shadow-md flex items-center';
                
                qrScannerLoop = requestAnimationFrame(tickQR);
            }).catch((err) => { 
                placeholder.innerHTML = `<i class="fas fa-video-slash text-5xl mb-4 text-rose-500"></i><p class="text-sm font-bold text-rose-500">Kamera Ditolak/Error.</p>`; 
            });
    }

    let qrCanvas = document.createElement('canvas');
    function tickQR() {
        if(isQrVerified || currentActiveView !== 'siswa-scan') return;
        const video = document.getElementById('webcam-qr');
        
        if(video && video.readyState === video.HAVE_ENOUGH_DATA) {
            qrCanvas.height = video.videoHeight;
            qrCanvas.width = video.videoWidth;
            const qrContext = qrCanvas.getContext('2d', { willReadFrequently: true });
            qrContext.drawImage(video, 0, 0, qrCanvas.width, qrCanvas.height);
            let imageData = qrContext.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
            
            let code = jsQR(imageData.data, imageData.width, imageData.height, {inversionAttempts: "dontInvert"});
            
            if(code) {
                const d = new Date();
                const todayStr = String(d.getDate()).padStart(2, '0') + String(d.getMonth()+1).padStart(2, '0') + d.getFullYear();
                
                if(code.data === "SAWAH_QR_" + todayStr) {
                    isQrVerified = true;
                    document.getElementById('gps-status').innerHTML = '<i class="fas fa-check-circle mr-1"></i> QR Valid';
                    document.getElementById('gps-status').className = 'absolute top-5 right-5 text-[10px] uppercase font-bold bg-emerald-500 text-white px-2.5 py-1 rounded-full shadow-md flex items-center';
                    
                    Swal.fire({icon: 'success', title: 'Akses Diberikan!', text: 'Membuka kamera depan untuk deteksi wajah...', timer: 1500, showConfirmButton: false});
                    stopMediaTracks(streamQR); 
                    
                    setTimeout(() => {
                        document.getElementById('qr-container').classList.add('hidden');
                        document.getElementById('face-container').classList.remove('hidden');
                        document.getElementById('scan-subtitle').innerText = "Langkah 2: Verifikasi Wajah";
                        startFaceScanner(); 
                    }, 500);
                    return; 
                } else {
                    document.getElementById('gps-status').innerHTML = '<i class="fas fa-times-circle mr-1"></i> QR Ditolak';
                    document.getElementById('gps-status').className = 'absolute top-5 right-5 text-[10px] uppercase font-bold bg-rose-500 text-white px-2.5 py-1 rounded-full shadow-md flex items-center';
                }
            }
        }
        qrScannerLoop = requestAnimationFrame(tickQR); 
    }

    function startFaceScanner() {
        const video = document.getElementById('webcam-face');
        const placeholder = document.getElementById('face-placeholder');
        const guide = document.getElementById('face-guide');
        const btnIn = document.getElementById('btn-in');
        const btnOut = document.getElementById('btn-out');
        const status = document.getElementById('gps-status');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then((s) => {
                streamFace = s; 
                video.srcObject = streamFace; 
                
                // Mencegah video blank pada beberapa HP
                video.onloadedmetadata = () => { video.play(); };

                video.classList.remove('hidden'); 
                placeholder.classList.add('hidden'); 
                guide.classList.remove('hidden');
                
                status.innerHTML = '<i class="fas fa-camera mr-1"></i> Kamera Siap';
                status.className = 'absolute top-5 right-5 text-[10px] uppercase font-bold bg-blue-500 text-white px-2.5 py-1 rounded-full shadow-md flex items-center';
                
                btnIn.disabled = false; btnIn.classList.remove('opacity-50', 'cursor-not-allowed'); 
                btnOut.disabled = false; btnOut.classList.remove('opacity-50', 'cursor-not-allowed');
            }).catch((err) => { 
                placeholder.innerHTML = `<i class="fas fa-video-slash text-5xl mb-4 text-rose-500"></i><p class="text-sm font-bold text-rose-500">Akses Kamera Depan Ditolak.</p>`; 
            });
    }

    function processScan(type) {
        const video = document.getElementById('webcam-face'); 
        const instruction = document.getElementById('liveness-instruction'); 
        const scanLine = document.getElementById('face-scan-line-anim');
        const challenges = ["Silakan Tersenyum", "Toleh Ke Kiri Sedikit", "Kedipkan Mata Anda"];
        const randomChallenge = challenges[Math.floor(Math.random() * challenges.length)];
        
        scanLine.classList.remove('hidden'); instruction.innerHTML = `<span class="text-amber-300 animate-pulse">${randomChallenge}</span>`;
        document.getElementById('btn-in').disabled = true; document.getElementById('btn-out').disabled = true;

        setTimeout(() => {
            instruction.innerHTML = `<span class="text-emerald-400"><i class="fas fa-check-circle"></i> Wajah Terverifikasi Asli</span>`;
            const canvas = document.createElement('canvas'); 
            
            // Dinamis sesuai ukuran kamera HP
            canvas.width = video.videoWidth || 320; 
            canvas.height = video.videoHeight || 240; 
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            saveAttendance(type, canvas.toDataURL('image/jpeg', 0.5));
        }, 2000);
    }

    function saveAttendance(type, base64Image) {
        document.getElementById('face-scan-line-anim').classList.add('hidden'); 
        document.getElementById('liveness-instruction').innerText = "Kamera Siap.";
        document.getElementById('btn-in').disabled = false; document.getElementById('btn-out').disabled = false;

        fetch(GAS_URL, {
            method: 'POST', body: JSON.stringify({ action: 'scan', type: type, id_user: currentUser.id, image: base64Image, lat: "QR_VERIFIED", lon: "QR_VERIFIED" })
        }).then(res => res.json()).then(res => { 
            if(res.success) {
                if(type === 'IN') { dummyAbsensi.unshift(res.data); } 
                else if(type === 'OUT') { 
                    let exist = dummyAbsensi.find(a => a.id_user === currentUser.id && a.waktu_out === '-'); 
                    if(exist) exist.waktu_out = res.data.waktu_out;
                }
                Swal.fire({ icon: 'success', title: `Scan ${type} Berhasil!`, html: `<p class="text-slate-600 font-medium">Tercatat di Server</p><img src="${base64Image}" class="mt-4 rounded-xl mx-auto w-48 border-4 border-emerald-100 shadow-md">`, confirmButtonColor: '#10b981' });
            } else Swal.fire('Ditolak', res.message, 'error'); 
        });
    }

    // FIX: Bypass khusus mode dummy agar perekaman tidak error 
    window.simpanWajahBaru = function() {
        const video = document.getElementById('webcam-reg');
        const btn = document.getElementById('btn-reg-wajah');
        if(!video) return;

        const originalBtn = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Menyimpan ke Server...';
        btn.disabled = true;

        const canvas = document.createElement('canvas'); 
        canvas.width = video.videoWidth || 320; 
        canvas.height = video.videoHeight || 240; 
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const fotoBase64 = canvas.toDataURL('image/jpeg', 0.8);

        // Bypass jika testing menggunakan akun Dummy 'peserta'
        if (IS_PREVIEW && currentUser.id === 'U2') {
            currentUser.foto = fotoBase64;
            Swal.fire({ icon: 'success', title: 'Berhasil!', text: 'Wajah berhasil tersimpan di sistem (Mode Preview).' }).then(() => {
                changeView('siswa-scan'); 
            });
            return;
        }

        fetch(GAS_URL, {
            method: 'POST', body: JSON.stringify({ action: 'updateUser', data: { id: currentUser.id, foto: fotoBase64 } })
        }).then(r => r.json()).then(res => {
            if(res.success) {
                currentUser.foto = fotoBase64;
                Swal.fire({ icon: 'success', title: 'Berhasil!', text: 'Wajah Anda berhasil tersimpan di sistem.' }).then(() => {
                    changeView('siswa-scan'); 
                });
            } else {
                Swal.fire('Gagal', res.message, 'error');
                btn.innerHTML = originalBtn; btn.disabled = false;
            }
        }).catch(err => {
            Swal.fire('Error', 'Gagal menghubungi server.', 'error');
            btn.innerHTML = originalBtn; btn.disabled = false;
        });
    }

    function renderSiswaIzin() {
        return `
            <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center"><i class="fas fa-file-medical text-blue-500 mr-2"></i> Lapor Ketidakhadiran</h3>
                <form id="izin-form" onsubmit="event.preventDefault(); submitIzin();" class="space-y-5">
                    <div><label class="block text-sm font-bold text-slate-700 mb-1">Kategori</label><select id="izin-kategori" class="w-full border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none"><option>Sakit (Perlu Surat)</option><option>Izin Kepentingan</option></select></div>
                    <div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-bold text-slate-700 mb-1">Dari</label><input type="date" id="izin-dari" required class="w-full border border-slate-300 rounded-xl p-3 outline-none"></div><div><label class="block text-sm font-bold text-slate-700 mb-1">Sampai</label><input type="date" id="izin-sampai" required class="w-full border border-slate-300 rounded-xl p-3 outline-none"></div></div>
                    <div><label class="block text-sm font-bold text-slate-700 mb-1">Alasan</label><textarea id="izin-alasan" required rows="3" class="w-full border border-slate-300 rounded-xl p-3 outline-none" placeholder="Jelaskan singkat..."></textarea></div>
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 border-dashed"><label class="block text-sm font-bold text-slate-700 mb-2">Upload Lampiran (Max 2MB)</label><input type="file" id="izin-file" accept="image/*,application/pdf" required class="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:bg-blue-100 file:text-blue-700 cursor-pointer"></div>
                    <button type="submit" id="btn-kirim-izin" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-md hover:bg-blue-700 transition active:scale-95"><i class="fas fa-paper-plane mr-2"></i> Kirim Pengajuan</button>
                </form>
            </div>`;
    }

    function renderAdminWaktu() {
        return `
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 max-w-2xl mx-auto">
                <div class="text-center mb-8"><div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4"><i class="fas fa-clock"></i></div><h3 class="text-2xl font-bold text-slate-800">Batas Waktu Operasional</h3></div>
                <form onsubmit="event.preventDefault(); Swal.fire('Tersimpan', 'Jadwal operasional diperbarui', 'success');" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-emerald-50/50 p-5 rounded-xl border border-emerald-100 shadow-sm relative overflow-hidden"><div class="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div><h4 class="font-bold text-emerald-800 mb-4 flex items-center"><i class="fas fa-sign-in-alt mr-2 text-emerald-600"></i>Sesi Scan Masuk</h4>
                            <div><label class="block text-xs font-bold text-slate-600 mb-1">Buka Absen</label><input type="time" class="w-full border-emerald-200 border rounded-lg p-2.5 font-mono" value="${dummyPengaturan.scan_in_start}"></div>
                            <div class="mt-4"><label class="block text-xs font-bold text-slate-600 mb-1">Batas Terlambat</label><input type="time" class="w-full border-emerald-200 border rounded-lg p-2.5 font-mono" value="${dummyPengaturan.scan_in_end}"></div>
                        </div>
                        <div class="bg-rose-50/50 p-5 rounded-xl border border-rose-100 shadow-sm relative overflow-hidden"><div class="absolute top-0 left-0 w-1 h-full bg-rose-500"></div><h4 class="font-bold text-rose-800 mb-4 flex items-center"><i class="fas fa-sign-out-alt mr-2 text-rose-600"></i>Sesi Scan Pulang</h4>
                            <div><label class="block text-xs font-bold text-slate-600 mb-1">Buka Absen</label><input type="time" class="w-full border-rose-200 border rounded-lg p-2.5 font-mono" value="${dummyPengaturan.scan_out_start}"></div>
                            <div class="mt-4"><label class="block text-xs font-bold text-slate-600 mb-1">Sistem Tutup</label><input type="time" class="w-full border-rose-200 border rounded-lg p-2.5 font-mono" value="${dummyPengaturan.scan_out_end}"></div>
                        </div>
                    </div>
                    <button type="submit" class="bg-slate-800 text-white px-4 py-3.5 rounded-xl w-full hover:bg-slate-900 shadow-md font-bold text-lg transition"><i class="fas fa-save mr-2"></i> TERAPKAN JADWAL</button>
                </form>
            </div>`;
    }

    function renderSiswaRiwayat() {
        const myAbsen = dummyAbsensi.filter(a => a.id_user === currentUser.id);
        let rows = myAbsen.map(a => `
            <tr class="border-b border-slate-100 hover:bg-slate-50"><td class="px-5 py-4 text-sm font-medium text-slate-700">${a.tanggal}</td><td class="px-5 py-4 text-sm font-bold text-emerald-600"><i class="fas fa-sign-in-alt text-xs mr-1 opacity-50"></i> ${a.waktu_in}</td><td class="px-5 py-4 text-sm font-bold text-rose-600"><i class="fas fa-sign-out-alt text-xs mr-1 opacity-50"></i> ${a.waktu_out}</td><td class="px-5 py-4 text-sm"><span class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full text-xs font-bold">${a.status}</span></td></tr>`).join('');
        if(rows === '') rows = '<tr><td colspan="4" class="text-center py-8 text-slate-400 font-medium">Belum ada riwayat absensi.</td></tr>';

        return `<div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100"><div class="bg-slate-900 p-5 text-white flex justify-between items-center shadow-inner"><h3 class="text-lg font-bold"><i class="fas fa-history text-blue-400 mr-2"></i> Log Kehadiran Anda</h3><button onclick="mockAction('Download PDF')" class="bg-slate-800 hover:bg-slate-700 text-xs px-3 py-1.5 rounded-lg border border-slate-700 transition">Download PDF</button></div><div class="overflow-x-auto custom-scroll"><table class="w-full text-left"><thead class="bg-slate-50 border-b border-slate-200"><tr><th class="px-5 py-3 text-xs uppercase tracking-wider font-bold text-slate-500">Tanggal</th><th class="px-5 py-3 text-xs uppercase tracking-wider font-bold text-slate-500">Scan Masuk</th><th class="px-5 py-3 text-xs uppercase tracking-wider font-bold text-slate-500">Scan Keluar</th><th class="px-5 py-3 text-xs uppercase tracking-wider font-bold text-slate-500">Keterangan</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    }
</script>
